<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Wine Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--g:#1a3a2a;--felt:#1e4430;--gold:#c9a84c;--gl:#e8c97a;--cream:#f5f0e8;--red:#7a1b2e;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--g);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.08),transparent 55%);pointer-events:none;z-index:0}
.screen{display:none;position:fixed;inset:0;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex;flex-direction:column;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.4)}
input[type=text],input[type=number]{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.2);border-radius:12px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 16px;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--gold)}
.btn-gold{background:var(--gold);color:var(--g);border:none;border-radius:14px;padding:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;width:100%}
.btn-gold:active{background:var(--gl)}
.btn-gold:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gl);cursor:pointer;white-space:nowrap}
.btn-sm:active{background:rgba(201,168,76,.22)}
.btn-ghost{background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:12px 18px;color:rgba(245,240,232,.6);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.btn-ghost:active{border-color:var(--gold);color:var(--gl)}
.btn-danger{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:#e87c6e;cursor:pointer}
.back{background:none;border:none;color:rgba(245,240,232,.4);font-size:15px;cursor:pointer;padding:4px 0}
.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.page-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gl);flex:1}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(24px + var(--safe))}
.f-group{margin-bottom:18px}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--gl)}
.tag .x{cursor:pointer;color:rgba(201,168,76,.5);font-size:15px;line-height:1}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:10px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--cream);min-height:44px;display:flex;align-items:center}
.pill.sel{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gl)}
.mult{display:inline-block;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--gl)}
.spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(18px + var(--safe));left:50%;transform:translateX(-50%);background:rgba(18,46,28,.97);border:1px solid var(--gold);border-radius:12px;padding:12px 22px;font-size:14px;color:var(--cream);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1}
::-webkit-scrollbar{display:none}
.div{height:1px;background:rgba(201,168,76,.1);margin:16px 0}
.add-opt-row{display:flex;gap:8px}
.add-opt-row input{flex:1}

/* LANDING */
#screen-landing{justify-content:center;align-items:center;padding:40px 24px}
.logo{font-family:'Cormorant Garamond',serif;font-size:clamp(58px,16vw,96px);font-weight:600;color:var(--gold);text-align:center;line-height:.88;letter-spacing:-2px}
.logo-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(245,240,232,.3);text-align:center;margin:10px 0 44px}
.role-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px}
.role-card{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:22px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;min-height:76px}
.role-card:active{background:rgba(201,168,76,.1);border-color:var(--gold)}
.role-icon{font-size:34px;flex-shrink:0}
.role-title{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--gl)}
.role-desc{font-size:13px;color:rgba(245,240,232,.4);margin-top:2px}

/* SETUP */
.wine-item{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.wine-item-head{display:flex;align-items:center;gap:10px;cursor:pointer}
.wine-num-badge{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);width:28px;flex-shrink:0}
.wine-answers{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(201,168,76,.1)}
.answer-chip{font-size:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 10px;color:rgba(245,240,232,.5)}
.answer-chip.set{border-color:rgba(201,168,76,.3);color:var(--gl)}
.rev-opt{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:13px;color:var(--cream);min-height:40px;display:flex;align-items:center}
.rev-opt.sel{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gl)}

/* HOST GAME */
#screen-host{padding:0}
.h-topbar{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;gap:10px;flex-shrink:0}
.h-code-btn{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);letter-spacing:5px;cursor:pointer;background:none;border:none;padding:0}
.round-pill{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:5px 12px;font-size:13px;color:var(--gl);white-space:nowrap}
.h-tabs{display:flex;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.h-tab{flex:1;padding:12px 6px;font-size:13px;color:rgba(245,240,232,.35);cursor:pointer;border-bottom:2px solid transparent;text-align:center}
.h-tab.active{color:var(--gl);border-bottom-color:var(--gold)}
.h-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.h-bottom{display:flex;padding:10px 14px;padding-bottom:calc(10px + var(--safe));border-top:1px solid rgba(201,168,76,.12);gap:10px;flex-shrink:0}
.bets-table{width:100%;border-collapse:collapse;font-size:13px}
.bets-table th{text-align:left;padding:8px 10px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.35);border-bottom:1px solid rgba(201,168,76,.1);font-weight:400}
.bets-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.bets-table tr:last-child td{border-bottom:none}
.player-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.player-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}

/* PLAYER */
#screen-player{padding:0}
.p-header{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;gap:12px;flex-shrink:0}
.p-name{font-size:14px;color:rgba(245,240,232,.5);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-chips{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold)}
.p-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* PLAYER VIEWS — full-height panels inside p-content */
.p-view{min-height:100%;padding:16px 16px calc(24px + var(--safe))}

/* Lobby */
.lobby-box{text-align:center;padding:48px 0}
.lobby-code{font-family:'Cormorant Garamond',serif;font-size:50px;color:var(--gold);letter-spacing:10px;margin:10px 0 4px}

/* Betting */
.cat-block{background:rgba(0,0,0,.18);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:14px;margin-bottom:12px}
.cat-block.done{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
.cat-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cat-title{font-size:14px;font-weight:500}
.opts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px;margin-bottom:10px}
.opt{border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.12);min-height:44px}
.opt:active,.opt.sel{border-color:var(--gold);background:rgba(201,168,76,.13);color:var(--gl)}
.opt img{width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0}
.chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);flex-shrink:0}
.chip:active{transform:scale(.88)}
.c1{background:#d5d8dc;color:#333;border-color:#aaa}
.c5{background:#c0392b;color:#fff;border-color:#e74c3c}
.c10{background:#2471a3;color:#fff;border-color:#3498db}
.c25{background:#1e8449;color:#fff;border-color:#2ecc71}
.c50{background:#2c3e50;color:#fff;border-color:#7f8c8d}
.chip-foot{display:flex;align-items:center;gap:8px;margin-top:2px}
.stake-disp{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);min-width:48px}
.btn-clr{background:none;border:none;color:rgba(245,240,232,.3);font-size:12px;cursor:pointer;text-decoration:underline;padding:4px}

/* Confirm overlay */
.overlay{position:fixed;inset:0;z-index:20;background:var(--g);display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .2s ease}
.overlay-footer{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:calc(12px + var(--safe));background:rgba(20,50,32,.97);border-top:1px solid rgba(201,168,76,.15);display:flex;gap:10px;z-index:21}
.confirm-card{background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.confirm-cat{flex:1}
.confirm-cat-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:4px}
.confirm-cat-sel{font-size:16px;font-weight:500}
.confirm-cat-mult{font-size:12px;color:rgba(245,240,232,.4);margin-top:2px}
.confirm-amt{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold)}

/* Felt waiting */
.felt-view{background:var(--felt);position:relative}
.felt-view::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(0,0,0,.04) 30px,rgba(0,0,0,.04) 31px);pointer-events:none;z-index:0}
.felt-view .p-view{position:relative;z-index:1}
.felt-bet-card{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.22);border-radius:14px;padding:14px;margin-bottom:10px}
.felt-cat-lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(201,168,76,.45);margin-bottom:5px}
.felt-cat-sel{font-size:17px;font-weight:500;margin-bottom:3px}
.felt-cat-amt{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}
.others-panel{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-top:16px}
.others-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.3);margin-bottom:10px}
.other-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.other-row:last-child{border-bottom:none}
.other-name{font-size:13px;width:72px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.other-tags{flex:1;display:flex;flex-wrap:wrap;gap:4px}
.other-tag{font-size:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:3px 8px;color:rgba(245,240,232,.55)}

/* Result view */
.result-view{background:var(--felt);position:relative}
.result-view::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(0,0,0,.04) 30px,rgba(0,0,0,.04) 31px);pointer-events:none;z-index:0}
.result-view .p-view{position:relative;z-index:1}
.result-card{border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;animation:cardIn .35s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-card.win{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.35)}
.result-card.lose{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.25)}
.result-card.nobet{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07)}
.result-icon{font-size:26px;flex-shrink:0}
.result-info{flex:1}
.result-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:3px}
.result-ans{font-size:16px;font-weight:500}
.result-yours{font-size:12px;color:rgba(245,240,232,.4);margin-top:2px}
.result-earn{font-family:'Cormorant Garamond',serif;font-size:24px}
.result-earn.win{color:#2ecc71}
.result-earn.lose{color:#e74c3c}
.total-box{text-align:center;padding:20px 0 8px}
.total-num{font-family:'Cormorant Garamond',serif;font-size:52px;animation:pop .5s .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

/* chip fly */
.chip-fly{position:fixed;font-size:22px;pointer-events:none;z-index:100;animation:cfly 1.2s ease-out forwards}
@keyframes cfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2)}}

/* Final */
.lb{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.12);border-radius:14px;overflow:hidden}
.lb-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);gap:10px}
.lb-row:last-child{border-bottom:none}
.lb-row.winner{background:rgba(201,168,76,.08);border-left:3px solid var(--gold)}
.lb-row.me{background:rgba(201,168,76,.04)}
.lb-rank{font-family:'Cormorant Garamond',serif;font-size:20px;color:rgba(201,168,76,.3);width:22px}
.lb-rank.top{color:var(--gold)}
.lb-chips{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)}
.crown{font-size:40px;text-align:center;margin-bottom:8px;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
</style>
</head>
<body>

<!-- LANDING -->
<div id="screen-landing" class="screen">
  <div class="logo">Wine<br>Casino</div>
  <div class="logo-sub">Слепая дегустация · Ставки</div>
  <div class="role-cards">
    <div class="role-card" onclick="go('screen-setup')">
      <div class="role-icon">🎩</div>
      <div><div class="role-title">Организатор</div><div class="role-desc">Настроить вина и запустить игру</div></div>
    </div>
    <div class="role-card" onclick="go('screen-join')">
      <div class="role-icon">🍷</div>
      <div><div class="role-title">Игрок</div><div class="role-desc">Войти по коду и делать ставки</div></div>
    </div>
  </div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-landing')">← Назад</button>
    <div class="page-title">Настройка игры</div>
    <button class="btn-sm" onclick="openCatsEditor()">Категории</button>
  </div>
  <div class="scroll">
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Название сессии</div><input type="text" id="sess-name" value="Вечер с друзьями"></div>
    <div class="f-group">
      <div class="lbl" style="margin-bottom:8px">Стартовые фишки</div>
      <div class="pill-row" id="chips-pills">
        <div class="pill" onclick="selPill(this,100)">100</div>
        <div class="pill sel" onclick="selPill(this,200)">200</div>
        <div class="pill" onclick="selPill(this,500)">500</div>
        <div class="pill" onclick="selPill(this,1000)">1000</div>
      </div>
    </div>
    <div class="div"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="lbl">Вина в игре</div>
      <button class="btn-sm" onclick="addWine()">+ Добавить вино</button>
    </div>
    <div id="wines-list"></div>
    <div style="height:16px"></div>
    <button class="btn-gold" id="start-btn" onclick="createSession()" disabled>Запустить игру →</button>
  </div>
</div>

<!-- CATS EDITOR -->
<div id="screen-cats" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-setup')">← Назад</button>
    <div class="page-title">Категории</div>
  </div>
  <div class="scroll" id="cats-editor"></div>
</div>

<!-- WINE EDITOR -->
<div id="screen-wine" class="screen">
  <div class="page-header">
    <button class="back" onclick="saveWineBack()">← К списку</button>
    <div class="page-title" id="wine-title">Вино №1</div>
  </div>
  <div class="scroll" id="wine-body"></div>
</div>

<!-- JOIN -->
<div id="screen-join" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-landing')">← Назад</button>
    <div class="page-title">Войти в игру</div>
  </div>
  <div class="scroll">
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Код сессии</div>
      <input type="text" id="join-code" placeholder="ABC123" maxlength="6" style="text-align:center;font-size:28px;letter-spacing:8px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" autocomplete="off" autocapitalize="characters">
    </div>
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Ваше имя</div><input type="text" id="join-name" placeholder="Как тебя зовут?" autocomplete="given-name"></div>
    <button class="btn-gold" onclick="joinSession()">Присоединиться →</button>
  </div>
</div>

<!-- HOST GAME -->
<div id="screen-host" class="screen">
  <div class="h-topbar">
    <button class="h-code-btn" id="h-code" onclick="copyCode()">------</button>
    <div style="flex:1"></div>
    <div class="round-pill" id="h-round-pill">Вино 1/1</div>
  </div>
  <div class="h-tabs">
    <div class="h-tab active" onclick="hTab('bets')">Ставки</div>
    <div class="h-tab" onclick="hTab('players')">Игроки</div>
  </div>
  <div class="h-content" id="h-content"></div>
  <div class="h-bottom">
    <button class="btn-ghost" style="flex:1" id="h-reveal-btn" onclick="revealRound()">🔓 Открыть ответы</button>

/* HOST ACTIONS */
async function revealRound(){
  // Ответы уже заданы до игры — просто помечаем раунд как revealed и начисляем фишки
  const sess=await dbGet();if(!sess)return;
  const r=sess.current_round,wine=sess.wines[r-1],cats=sess.cats||[];
  const players={...sess.players};
  const bets=(sess.bets||{})[r]||{};
  // Settle bets
  Object.entries(bets).forEach(([pid,pb])=>{
    if(!players[pid])return;
    cats.forEach(cat=>{
      const bet=pb[cat.id];if(!bet)return;
      if(bet.sel===wine.answers[cat.id]){
        players[pid].chips+=bet.amt*cat.mult; // return stake × mult
      }
      // lost bets are already deducted when placed — nothing to do
    });
  });
  const revealed={...sess.revealed,[r]:true};
  await dbUpd({players,revealed,phase:'revealed'});
  toast('✓ Ответы открыты, фишки начислены');
}

async function nextRound(){
  const sess=await dbGet();if(!sess)return;
  if(sess.current_round>=sess.wines.length){endGame();return}
  await dbUpd({current_round:sess.current_round+1,phase:'betting'});
}

async function endGame(){
  await dbUpd({phase:'finished'});
  toast('🏆 Игра завершена!');
}

  try{await navigator.clipboard.writeText(S.code)}catch(e){}
  toast('Код: '+S.code);
}

function drawPlayer(sess){
  if(!sess)return;
  const me=(sess.players||{})[S.pid];
  if(me)document.getElementById('p-chips-hdr').textContent=me.chips;
  const r=sess.current_round;
  const myBets=((sess.bets||{})[r]||{})[S.pid]||null;
  const isRevealed=!!(sess.revealed||{})[r];

  if(sess.phase==='finished'){pView(finalHTML(sess));pClass('');return}

  // New round started — reset draft and redraw
  if(r!==S.curRound){
    S.draft={};
    S.curRound=r;
    S.pview='betting';
    // remove any lingering confirm overlay
    const ov=document.getElementById('confirm-ov');if(ov)ov.remove();
  }

  // Override view based on server state
  if(isRevealed&&myBets){
    if(S.pview!=='result'){S.pview='result';showResult(sess,myBets,r,me)}
    else updateResult(sess,myBets,r,me);
    return;
  }
  if(isRevealed&&!myBets){
    // Revealed but player never bet — show result with no-bets
    if(S.pview!=='result'){S.pview='result';showResult(sess,myBets,r,me)}
    return;
  }
  if(myBets&&!isRevealed){
    // Bets confirmed, waiting
    if(S.pview!=='waiting'){S.pview='waiting';showWaiting(sess,myBets,r)}
    else refreshWaitingOthers(sess,r);
    return;
  }
  // Betting phase — only render if not on confirm screen
  if(S.pview==='confirm')return;
  if(S.pview!=='betting'){S.pview='betting'}
  showBetting(sess,me,r);
}

    };
  });
  document.querySelectorAll('.chip').forEach(el=>{
    el.onclick=()=>{
      const cid=el.dataset.c,v=+el.dataset.v;
      if(!S.draft[cid])S.draft[cid]={sel:null,amt:0};
      const myChips=me?me.chips:0;
      const totalDraft=Object.values(S.draft).reduce((s,b)=>s+(b.amt||0),0);
      const thisDraft=S.draft[cid].amt||0;
      if(thisDraft+v+(totalDraft-thisDraft)>myChips){toast('Недостаточно фишек');return}
      S.draft[cid].amt+=v;
      updCB(cid);
    };
  });
  updPlaceBtn();
}

function updCB(cid){
  const bs=S.draft[cid]||{sel:null,amt:0};
  const sd=document.getElementById('sd-'+cid);if(sd)sd.textContent='🪙'+bs.amt;
  const cbv=document.getElementById('cbv-'+cid);if(cbv)cbv.textContent=bs.sel?'🪙'+bs.amt:'—';
  const cb=document.getElementById('cb-'+cid);if(cb)cb.classList.toggle('done',!!bs.sel);
  updPlaceBtn();
}
function updPlaceBtn(){
  const btn=document.getElementById('p-place-btn');
  if(btn)btn.disabled=!Object.values(S.draft).some(b=>b.sel&&b.amt>0);
}
function clearDraft(cid){
  S.draft[cid]={sel:null,amt:0};
  dbGet().then(sess=>{if(sess)showBetting(sess,(sess.players||{})[S.pid],sess.current_round)});
}

/* ── CONFIRM OVERLAY ── */
function openConfirm(){
  S.pview='confirm';
  dbGet().then(sess=>{
    if(!sess)return;
    const cats=sess.cats||[],r=sess.current_round,wine=sess.wines[r-1];
    const bets=Object.entries(S.draft).filter(([,b])=>b.sel&&b.amt>0);
    const total=bets.reduce((s,[,b])=>s+b.amt,0);
    const cards=bets.map(([cid,b])=>{
      const cat=cats.find(c=>c.id===cid);
      return`<div class="confirm-card">
        <div class="confirm-cat">
          <div class="confirm-cat-lbl">${esc(cat?.name||cid)}</div>
          <div class="confirm-cat-sel">${esc(b.sel)}</div>
          <div class="confirm-cat-mult">×${cat?.mult||2} при угадывании</div>
        </div>
        <div class="confirm-amt">🪙${b.amt}</div>
      </div>`;
    }).join('');
    // Inject overlay into p-content
    const el=document.getElementById('p-content');
    const ov=document.createElement('div');
    ov.id='confirm-ov';
    ov.className='overlay';
    ov.innerHTML=`
      <div class="page-header">
        <button class="back" onclick="closeConfirm()">← Изменить</button>
        <div class="page-title">${esc(wine?.name||'Вино №'+r)}</div>
      </div>
      <div style="padding:16px 16px calc(100px + var(--safe))">
        <div class="lbl" style="margin-bottom:14px">Ваши ставки</div>
        ${cards}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid rgba(201,168,76,.12);margin-top:4px">
          <span style="font-size:14px;color:rgba(245,240,232,.5)">Итого ставка</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold)">🪙${total}</span>
        </div>
      </div>
      <div class="overlay-footer">
        <button class="btn-ghost" style="flex:1" onclick="closeConfirm()">← Изменить</button>
        <button class="btn-gold" style="flex:2" onclick="confirmBets()">Подтвердить ✓</button>
      </div>`;
    document.body.appendChild(ov);
  });
}
function closeConfirm(){
  const ov=document.getElementById('confirm-ov');if(ov)ov.remove();
  S.pview='betting';
  dbGet().then(sess=>{if(sess)showBetting(sess,(sess.players||{})[S.pid],sess.current_round)});
}
async function confirmBets(){
  const sess=await dbGet();if(!sess)return;
  const me=(sess.players||{})[S.pid];if(!me)return;
  const r=sess.current_round;
  const bets={...sess.bets};
  if(!bets[r])bets[r]={};
  bets[r][S.pid]={};
  let spent=0;
  Object.entries(S.draft).forEach(([cid,b])=>{
    if(b.sel&&b.amt>0){bets[r][S.pid][cid]={sel:b.sel,amt:b.amt};spent+=b.amt}
  });
  const players={...sess.players};
  players[S.pid]={...me,chips:me.chips-spent};
  await dbUpd({bets,players});
  const ov=document.getElementById('confirm-ov');if(ov)ov.remove();
  S.pview='waiting';
  const newSess=await dbGet();
  if(newSess)showWaiting(newSess,bets[r][S.pid],r);
}

/* ── WAITING (FELT) ── */
function showWaiting(sess,myBets,r){
  const wine=sess.wines[r-1];
  const myCards=Object.entries(myBets).map(([cid,b])=>{
    const cat=(sess.cats||[]).find(c=>c.id===cid);
    return`<div class="felt-bet-card">
      <div class="felt-cat-lbl">${esc(cat?.name||cid)}</div>
      <div class="felt-cat-sel">${esc(b.sel)}</div>
      <div class="felt-cat-amt">🪙 ${b.amt}</div>
    </div>`;
  }).join('');
  const othersHTML=buildOthersHTML(sess,r);
  pView(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="flex:1">
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">${esc(wine?.name||'Вино №'+r)}</div>
        <div class="lbl" style="margin-top:2px">Ставки приняты · Ожидаем ответа</div>
      </div>
      <div class="spinner"></div>
    </div>
    <div class="lbl" style="margin-bottom:10px">Ваши ставки</div>
    ${myCards}
    <div id="waiting-others">${othersHTML}</div>
  `,'felt-view');
}
function refreshWaitingOthers(sess,r){
  const el=document.getElementById('waiting-others');
  if(el)el.innerHTML=buildOthersHTML(sess,r);
}
function buildOthersHTML(sess,r){
  const roundBets=(sess.bets||{})[r]||{},players=sess.players||{};
  const others=Object.entries(players).filter(([pid])=>pid!==S.pid);
  if(!others.length)return'';
  let h=`<div class="others-panel"><div class="others-title">Ставки других игроков</div>`;
  others.forEach(([pid,p])=>{
    const pb=roundBets[pid];
    if(pb){
      const tags=Object.entries(pb).map(([cid,bet])=>{
        const cat=(sess.cats||[]).find(c=>c.id===cid);
        return`<span class="other-tag">${esc(cat?.name||cid)}: ${esc(bet.sel)} 🪙${bet.amt}</span>`;
      }).join('');
      h+=`<div class="other-row"><div class="other-name">${esc(p.name)}</div><div class="other-tags">${tags}</div></div>`;
    } else {
      h+=`<div class="other-row"><div class="other-name">${esc(p.name)}</div><div class="other-tags"><span style="font-size:11px;color:rgba(245,240,232,.2)">думает...</span></div></div>`;
    }
  });
  return h+'</div>';
}

/* ── RESULT ── */
function showResult(sess,myBets,r,me){
  const wine=sess.wines[r-1],cats=sess.cats||[];
  let earned=0,lost=0;
  const cards=cats.map((cat,i)=>{
    const ans=wine.answers[cat.id];
    const myBet=myBets?.[cat.id];
    const won=myBet&&myBet.sel===ans;
    const nobet=!myBet;
    if(won)earned+=myBet.amt*cat.mult;
    if(!won&&myBet)lost+=myBet.amt;
    const cls=nobet?'nobet':won?'win':'lose';
    const icon=nobet?'🤷':won?'🎉':'😔';
    const earnTxt=nobet?'':(won?`+🪙${myBet.amt*cat.mult}`:`-🪙${myBet.amt}`);
    return`<div class="result-card ${cls}" style="animation-delay:${i*.1}s">
      <div class="result-icon">${icon}</div>
      <div class="result-info">
        <div class="result-lbl">${esc(cat.name)} ×${cat.mult}</div>
        <div class="result-ans">${esc(ans)}</div>
        ${myBet?`<div class="result-yours">Вы: ${esc(myBet.sel)}</div>`:'<div class="result-yours" style="color:rgba(245,240,232,.2)">Ставки не было</div>'}
      </div>
      ${earnTxt?`<div class="result-earn ${won?'win':'lose'}">${earnTxt}</div>`:''}
    </div>`;
  }).join('');

  const net=earned-lost;
  const isLast=r>=sess.wines.length;
  const nextBtn=isLast
    ?`<div style="font-size:13px;color:rgba(245,240,232,.35);text-align:center;padding:8px 0">Ожидаем завершения игры...</div>`
    :`<div style="font-size:13px;color:rgba(245,240,232,.35);text-align:center;padding:8px 0">Ожидаем следующего вина...</div>`;

  pView(`
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);margin-bottom:2px">${esc(wine?.name||'Вино №'+r)}</div>
      <div class="lbl">Результаты раунда</div>
    </div>
    ${cards}
    <div class="total-box">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.35);margin-bottom:8px">${net>=0?'Итого заработано':'Итого потеряно'}</div>
      <div class="total-num" style="color:${net>=0?'#2ecc71':'#e74c3c'}">${net>=0?'+':''} 🪙${net}</div>
      <div style="font-size:14px;color:rgba(245,240,232,.4);margin-top:6px">Баланс: 🪙${me?me.chips:'—'}</div>
    </div>
    ${lbSmall(sess)}
    <div style="margin-top:16px">${nextBtn}</div>
  `,'result-view');
  if(earned>0)flyChips(earned);
}

function updateResult(sess,myBets,r,me){showResult(sess,myBets,r,me)}

function lbSmall(sess){
  const sorted=Object.entries(sess.players||{}).sort((a,b)=>b[1].chips-a[1].chips);
  return`<div class="div"></div>
  <div class="lbl" style="margin-bottom:10px">Рейтинг</div>
  <div class="lb">${sorted.map(([id,p],i)=>`
    <div class="lb-row ${id===S.pid?'me':''}">
      <div class="lb-rank ${i<3?'top':''}">${i+1}</div>
      <div class="avatar" style="background:${avc(p.name)};width:28px;height:28px;font-size:12px">${p.name[0].toUpperCase()}</div>
      <div style="flex:1;font-size:14px">${esc(p.name)}${id===S.pid?' <span style="font-size:11px;opacity:.45">(вы)</span>':''}</div>
      <div class="lb-chips">🪙 ${p.chips}</div>
    </div>`).join('')}
  </div>`;
}



/* ── FINAL ── */
function finalHTML(sess){
  const sorted=Object.entries(sess.players||{}).sort((a,b)=>b[1].chips-a[1].chips);
  const w=sorted[0];
  return`<div style="text-align:center;padding:40px 0 20px">
    <div class="crown">🏆</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold);margin-bottom:4px">Игра завершена!</div>
    <div style="font-size:14px;color:rgba(245,240,232,.4);margin-bottom:6px">${esc(sess.name)}</div>
    ${w?`<div style="font-size:15px;color:rgba(245,240,232,.6)">Победитель: <strong style="color:var(--gl)">${esc(w[1].name)}</strong></div>`:''}
  </div>
  <div class="div"></div>
  <div class="lbl" style="margin-bottom:12px">Итоговая таблица</div>
  <div class="lb">
    ${sorted.map(([id,p],i)=>`<div class="lb-row ${i===0?'winner':''} ${id===S.pid?'me':''}">
      <div class="lb-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="avatar" style="background:${avc(p.name)};width:32px;height:32px;font-size:14px">${p.name[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-size:15px">${esc(p.name)}${id===S.pid?' <span style="font-size:11px;opacity:.45">(вы)</span>':''}</div>${i===0?'<div style="font-size:11px;color:var(--gold);margin-top:2px">Победитель!</div>':''}</div>
      <div class="lb-chips">🪙 ${p.chips}</div>
    </div>`).join('')}
  </div>`;
}

/* ── CHIP ANIMATION ── */
function flyChips(amt){
  const n=Math.min(Math.ceil(amt/15),14);
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='chip-fly';el.textContent='🪙';
      const tx=(Math.random()-.5)*200,ty=-(100+Math.random()*250);
      el.style.cssText=`left:${25+Math.random()*50}%;top:55%;--tx:${tx}px;--ty:${ty}px;animation-delay:${Math.random()*.5}s`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),1800);
    },i*70);
  }
}

window.addEventListener('DOMContentLoaded',()=>{renderWines();go('screen-landing')});
</script>
</body>
</html>
