<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a2a">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<title>Wine Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--g:#1a3a2a;--felt:#1e4430;--gold:#c9a84c;--gl:#e8c97a;--cream:#f5f0e8;--red:#7a1b2e;--win:#2ecc71;--lose:#e74c3c;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--g);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:16px;-webkit-text-size-adjust:100%}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.08),transparent 55%);pointer-events:none;z-index:0}
.screen{display:none;position:fixed;inset:0;z-index:1;overflow:hidden;flex-direction:column}
.screen.active{display:flex;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.4)}
input[type=text],input[type=number]{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.2);border-radius:12px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 16px;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--gold)}
.btn-gold{background:var(--gold);color:var(--g);border:none;border-radius:14px;padding:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;width:100%;transition:background .12s}
.btn-gold:active{background:var(--gl)}
.btn-gold:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gl);cursor:pointer;white-space:nowrap;transition:background .12s}
.btn-sm:active{background:rgba(201,168,76,.22)}
.btn-sm:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:12px 18px;color:rgba(245,240,232,.65);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.btn-ghost:active{border-color:var(--gold);color:var(--gl)}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed}
.btn-danger{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:#e87c6e;cursor:pointer}
.back{background:none;border:none;color:rgba(245,240,232,.4);font-size:15px;cursor:pointer;padding:4px 0}
.back:active{color:var(--cream)}
.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0;background:var(--g);z-index:2}
.page-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gl);flex:1}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(24px + var(--safe))}
.f-group{margin-bottom:18px}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--gl)}
.tag .x{cursor:pointer;color:rgba(201,168,76,.5);font-size:15px;line-height:1;padding:0 2px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:10px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--cream);min-height:44px;display:flex;align-items:center;transition:all .12s}
.pill.sel{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gl)}
.mult{display:inline-block;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--gl);font-weight:500}
.spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(20px + var(--safe));left:50%;transform:translateX(-50%);background:rgba(18,46,28,.97);border:1px solid var(--gold);border-radius:12px;padding:12px 22px;font-size:14px;color:var(--cream);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1}
::-webkit-scrollbar{display:none}
.div{height:1px;background:rgba(201,168,76,.1);margin:16px 0}
.add-opt-row{display:flex;gap:8px}
.add-opt-row input{flex:1}

/* LOADING */
#screen-loading{justify-content:center;align-items:center;gap:18px}

/* LANDING */
#screen-landing{justify-content:center;align-items:center;padding:40px 24px}
.logo{font-family:'Cormorant Garamond',serif;font-size:clamp(58px,16vw,96px);font-weight:600;color:var(--gold);text-align:center;line-height:.88;letter-spacing:-2px}
.logo-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(245,240,232,.3);text-align:center;margin:10px 0 32px}
.role-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px}
.role-card{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:22px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;min-height:76px;transition:all .15s}
.role-card:active{background:rgba(201,168,76,.1);border-color:var(--gold)}
.role-icon{font-size:34px;flex-shrink:0}
.role-title{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--gl)}
.role-desc{font-size:13px;color:rgba(245,240,232,.4);margin-top:2px}
.resume-bar{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:14px;padding:14px 18px;width:100%;max-width:380px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.resume-info{flex:1;font-size:13px;color:rgba(245,240,232,.7)}
.resume-info strong{color:var(--gl);font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:2px}
.resume-info .role-line{font-size:11px;color:rgba(245,240,232,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}

/* WINE LIST */
.wine-item{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.wine-item-head{display:flex;align-items:center;gap:10px;cursor:pointer}
.wine-num-badge{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);width:28px;flex-shrink:0}
.wine-answers{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(201,168,76,.1)}
.answer-chip{font-size:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 10px;color:rgba(245,240,232,.5)}
.answer-chip.set{border-color:rgba(201,168,76,.3);color:var(--gl)}
.rev-opt{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:13px;color:var(--cream);min-height:40px;display:flex;align-items:center;transition:all .12s}
.rev-opt:active{background:rgba(201,168,76,.1)}
.rev-opt.sel{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gl)}

/* HOST */
.h-topbar{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--g);z-index:2}
.h-code-btn{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);letter-spacing:5px;cursor:pointer;background:none;border:none;padding:0}
.round-pill{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:5px 12px;font-size:13px;color:var(--gl);white-space:nowrap}
.h-tabs{display:flex;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0;background:var(--g);z-index:2}
.h-tab{flex:1;padding:12px 6px;font-size:13px;color:rgba(245,240,232,.35);cursor:pointer;border-bottom:2px solid transparent;text-align:center;transition:all .12s}
.h-tab.active{color:var(--gl);border-bottom-color:var(--gold)}
.h-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.h-bottom{display:flex;padding:10px 14px;padding-bottom:calc(10px + var(--safe));border-top:1px solid rgba(201,168,76,.12);gap:8px;flex-shrink:0;background:var(--g)}
.bets-table{width:100%;border-collapse:collapse;font-size:13px}
.bets-table th{text-align:left;padding:8px 10px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.35);border-bottom:1px solid rgba(201,168,76,.1);font-weight:400}
.bets-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.bets-table tr:last-child td{border-bottom:none}
.player-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.player-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;color:#fff}

/* PLAYER */
.p-header{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--g);z-index:2}
.p-name{font-size:14px;color:rgba(245,240,232,.5);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-chips{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);display:flex;align-items:center;gap:4px}
.p-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.p-view{min-height:100%;padding:16px 16px calc(24px + var(--safe))}

/* Lobby */
.lobby-box{text-align:center;padding:40px 0 20px}
.lobby-code{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--gold);letter-spacing:10px;margin:10px 0 4px}

/* Betting blocks */
.cat-block{background:rgba(0,0,0,.18);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:14px;margin-bottom:12px;transition:border-color .2s,background .2s}
.cat-block.done{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
.cat-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
.cat-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.cat-stake-display{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);flex-shrink:0}
.opts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px;margin-bottom:10px}
.opt{border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.12);min-height:44px;transition:all .12s}
.opt:active{border-color:var(--gold);background:rgba(201,168,76,.08)}
.opt.sel{border-color:var(--gold);background:rgba(201,168,76,.14);color:var(--gl)}
.opt img{width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0}
.chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);flex-shrink:0;transition:transform .1s;color:#fff}
.chip:active{transform:scale(.88)}
.chip.disabled{opacity:.3;cursor:not-allowed}
.c1{background:#d5d8dc;color:#333;border-color:#aaa}
.c5{background:#c0392b;border-color:#e74c3c}
.c10{background:#2471a3;border-color:#3498db}
.c25{background:#1e8449;border-color:#2ecc71}
.c50{background:#2c3e50;border-color:#7f8c8d}
.chip-foot{display:flex;align-items:center;gap:8px;margin-top:2px}
.btn-clr{background:none;border:none;color:rgba(245,240,232,.3);font-size:12px;cursor:pointer;text-decoration:underline;padding:4px}
.btn-clr:active{color:rgba(245,240,232,.6)}

/* Available chips bar */
.avail-bar{position:sticky;top:0;background:rgba(20,50,32,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:10px 14px;margin:-16px -16px 14px;border-bottom:1px solid rgba(201,168,76,.15);display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:2}
.avail-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.4)}
.avail-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}
.avail-num.low{color:var(--lose)}

/* Confirm overlay */
.overlay{position:fixed;inset:0;z-index:20;background:var(--g);display:flex;flex-direction:column;animation:fi .2s ease}
.overlay-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(96px + var(--safe))}
.overlay-footer{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:calc(12px + var(--safe));background:rgba(20,50,32,.97);border-top:1px solid rgba(201,168,76,.15);display:flex;gap:10px;z-index:21}
.confirm-card{background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.confirm-cat-info{flex:1;min-width:0}
.confirm-cat-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:4px}
.confirm-cat-sel{font-size:16px;font-weight:500}
.confirm-cat-mult{font-size:12px;color:rgba(245,240,232,.4);margin-top:2px}
.confirm-amt{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);flex-shrink:0}

/* Felt view */
.felt-bg{background:var(--felt)}
.felt-bg::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(0,0,0,.04) 30px,rgba(0,0,0,.04) 31px);pointer-events:none;z-index:0}
.felt-bg .p-view{position:relative;z-index:1}
.felt-bet-card{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.22);border-radius:14px;padding:14px;margin-bottom:10px}
.felt-cat-lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(201,168,76,.45);margin-bottom:5px}
.felt-cat-sel{font-size:17px;font-weight:500;margin-bottom:3px}
.felt-cat-amt{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}
.others-panel{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-top:16px}
.others-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.3);margin-bottom:10px}
.other-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.other-row:last-child{border-bottom:none}
.other-name{font-size:13px;width:72px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.other-tags{flex:1;display:flex;flex-wrap:wrap;gap:4px}
.other-tag{font-size:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:3px 8px;color:rgba(245,240,232,.55)}

/* Result */
.result-card{border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;animation:cardIn .35s ease both;opacity:0}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-card.win{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.35)}
.result-card.lose{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.25)}
.result-card.nobet{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07)}
.result-icon{font-size:26px;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:3px}
.result-ans{font-size:16px;font-weight:500;word-break:break-word}
.result-yours{font-size:12px;color:rgba(245,240,232,.4);margin-top:2px}
.result-earn{font-family:'Cormorant Garamond',serif;font-size:22px;flex-shrink:0}
.result-earn.win{color:var(--win)}
.result-earn.lose{color:var(--lose)}
.total-box{text-align:center;padding:20px 0 8px}
.total-num{font-family:'Cormorant Garamond',serif;font-size:52px;animation:pop .5s .6s cubic-bezier(.34,1.56,.64,1) both;opacity:0}
@keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.chip-fly{position:fixed;font-size:22px;pointer-events:none;z-index:100;animation:cfly 1.4s ease-out forwards}
@keyframes cfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2)}}

/* Leaderboard */
.lb{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.12);border-radius:14px;overflow:hidden}
.lb-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);gap:10px}
.lb-row:last-child{border-bottom:none}
.lb-row.winner{background:rgba(201,168,76,.08);border-left:3px solid var(--gold)}
.lb-row.me{background:rgba(201,168,76,.04)}
.lb-rank{font-family:'Cormorant Garamond',serif;font-size:20px;color:rgba(201,168,76,.3);width:26px;text-align:center}
.lb-rank.top{color:var(--gold);font-size:22px}
.lb-chips{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)}
.crown{font-size:48px;text-align:center;margin-bottom:8px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-10px) scale(1.05)}}

/* Confirm dialog */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fi .2s ease}
.dialog{background:#1a3a2a;border:1px solid var(--gold);border-radius:18px;padding:24px;max-width:380px;width:100%}
.dialog h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gl);margin-bottom:8px}
.dialog p{font-size:14px;color:rgba(245,240,232,.65);line-height:1.5;margin-bottom:20px}
.dialog-btns{display:flex;gap:10px}
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="spinner"></div>
  <div style="color:rgba(245,240,232,.4);font-size:14px">Загрузка...</div>
</div>

<!-- LANDING -->
<div id="screen-landing" class="screen">
  <div class="logo">Wine<br>Casino</div>
  <div class="logo-sub">Слепая дегустация · Ставки</div>
  <div id="resume-box"></div>
  <div class="role-cards">
    <div class="role-card" onclick="go('screen-setup')">
      <div class="role-icon">🎩</div>
      <div><div class="role-title">Организатор</div><div class="role-desc">Настроить вина и запустить игру</div></div>
    </div>
    <div class="role-card" onclick="go('screen-join')">
      <div class="role-icon">🍷</div>
      <div><div class="role-title">Игрок</div><div class="role-desc">Войти по коду и делать ставки</div></div>
    </div>
  </div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-landing')">← Назад</button>
    <div class="page-title">Настройка игры</div>
    <button class="btn-sm" onclick="openCatsEditor()">Категории</button>
  </div>
  <div class="scroll">
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Название сессии</div><input type="text" id="sess-name" value="Вечер с друзьями"></div>
    <div class="f-group">
      <div class="lbl" style="margin-bottom:8px">Стартовые фишки</div>
      <div class="pill-row" id="chips-pills">

<script>

);

// ════════════════════════════════════════════════

const DEF_CATS = [

// ════════════════════════════════════════════════

function $(id) { return document.getElementById(id); }
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function attr(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2800);
}
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r = '';
  for (let i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}
function genId() { return Math.random().toString(36).slice(2, 11); }
function avc(n) {
  const c = ['#7a1b2e','#2471a3','#1e8449','#634a1e','#5b3a8a','#1a6f6f','#9c4a00','#1a5a5a'];
  let h = 0;
  for (const x of String(n)) h = (h * 31 + x.charCodeAt(0)) % c.length;
  return c[h];
}
function pl(n, one, few, many) {
  if (n % 10 === 1 && n % 100 !== 11) return one;
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return few;
  return many;
}

// LocalStorage session persistence
const LS_KEY = 'wc_session_v4';
function saveLS() {
  if (!ST.code || !ST.role) return;
  localStorage.setItem(LS_KEY, JSON.stringify({
    role: ST.role,
    code: ST.code,
    pid: ST.pid,
    pname: ST.pname
  }));
}
function loadLS() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); }
  catch(e) { return null; }
}
function clearLS() { localStorage.removeItem(LS_KEY); }

// ════════════════════════════════════════════════
//  SUPABASE OPS
// ════════════════════════════════════════════════
async function dbGet(code) {
  const c = code || ST.code;
  if (!c) return null;
  const { data, error } = await SB.from('sessions').select('*').eq('code', c).maybeSingle();
  if (error) console.error('dbGet error', error);
  return data;
}
async function dbUpd(obj, code) {
  const c = code || ST.code;
  const { error } = await SB.from('sessions').update(obj).eq('code', c);
  if (error) { console.error('dbUpd error', error); toast('Ошибка БД: ' + error.message); }
}

// ════════════════════════════════════════════════
//  STARTUP — try resume
// ════════════════════════════════════════════════
async function startup() {
  const saved = loadLS();
  if (!saved) { go('screen-landing'); return; }
  // Verify session still exists
  const sess = await dbGet(saved.code);
  if (!sess) {
    clearLS();
    go('screen-landing');
    return;
  }
  if (sess.phase === 'finished' && saved.role === 'host') {
    // Allow viewing the final screen but don't resume
    // Actually just clear and go landing for host on finished
    clearLS();
    go('screen-landing');
    return;
  }
  // Resume
  ST.role = saved.role;
  ST.code = saved.code;
  ST.pid = saved.pid;
  ST.pname = saved.pname;

  if (ST.role === 'host') {
    $('h-code').textContent = ST.code;
    go('screen-host');
    subHost();
    refreshHost(sess);
  } else {
    // Verify player still exists in session
    if (!sess.players || !sess.players[ST.pid]) {
      // Rejoin under same name (if possible)
      const newPid = genId();
      const players = { ...sess.players, [newPid]: { name: ST.pname, chips: sess.start_chips } };
      await dbUpd({ players }, ST.code);
      ST.pid = newPid;
      saveLS();
    }
    $('p-name-hdr').textContent = ST.pname;
    go('screen-player');
    subPlayer();
    drawPlayer(await dbGet());
  }
}

// Show "resume" hint on landing if there's a saved session that's still valid

      <button class="btn-sm" onclick="clearResume()" style="background:transparent;color:rgba(245,240,232,.4)">✕</button>
    </div>`;
}

// ════════════════════════════════════════════════

// ════════════════════════════════════════════════
function openCatsEditor() { renderCatsEditor(); go('screen-cats'); }
function renderCatsEditor() {
  $('cats-editor').innerHTML = ST.cats.map((c, i) => `
    <div style="background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <input type="text" value="${attr(c.name)}" oninput="ST.cats[${i}].name=this.value" style="flex:1;min-width:140px;padding:10px 14px;font-size:14px;font-weight:500">

        <input type="number" value="${c.mult}" min="1" max="10" oninput="ST.cats[${i}].mult=+this.value" style="width:60px;text-align:center;padding:9px 8px">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:rgba(245,240,232,.5)">
          <input type="checkbox" ${c.enabled ? 'checked' : ''} onchange="ST.cats[${i}].enabled=this.checked;renderWines()" style="width:18px;height:18px;accent-color:var(--gold)"> Вкл
        </label>
        <button class="btn-danger" onclick="rmCat(${i})" style="margin-left:auto">✕</button>
      </div>
      <div class="tags-wrap">${c.options.map((o, j) => `<span class="tag">${esc(o)}<span class="x" onclick="rmOpt(${i},${j})">×</span></span>`).join('')}</div>
      <div class="add-opt-row">
        <input type="text" id="nopt-${i}" placeholder="Добавить вариант..." style="font-size:14px;padding:10px 14px" onkeydown="if(event.key==='Enter')addOpt(${i})">
        <button class="btn-sm" onclick="addOpt(${i})">+</button>
      </div>
    </div>`).join('') +
    `<button class="btn-sm" style="width:100%;padding:13px;margin-bottom:16px" onclick="addCat()">+ Добавить категорию</button>`;
}
function addOpt(i) {
  const inp = $(`nopt-${i}`);
  const v = inp.value.trim();
  if (!v) return;
  ST.cats[i].options.push(v);
  inp.value = '';
  renderCatsEditor();
}
function rmOpt(i, j) {
  ST.cats[i].options.splice(j, 1);
  // Also remove this answer from any wines that had it
  const optVal = ST.cats[i].options;
  ST.wines.forEach(w => {
    if (w.answers[ST.cats[i].id] && !optVal.includes(w.answers[ST.cats[i].id])) {
      delete w.answers[ST.cats[i].id];
    }
  });
  renderCatsEditor();
}
function addCat() {
  ST.cats.push({ id: 'cat_' + Date.now(), name: 'Новая категория', mult: 2, enabled: true, options: [] });
  renderCatsEditor();
}
function rmCat(i) {
  if (!confirm('Удалить категорию "' + ST.cats[i].name + '"?')) return;
  const catId = ST.cats[i].id;
  ST.wines.forEach(w => { delete w.answers[catId]; });
  ST.cats.splice(i, 1);
  renderCatsEditor();
  renderWines();
}

function selChips(el, v) {
  document.querySelectorAll('#chips-pills .pill').forEach(b => b.classList.remove('sel'));

}

// ════════════════════════════════════════════════
//  SETUP — wines
// ════════════════════════════════════════════════
function addWine() {
  const i = ST.wines.length;
  ST.wines.push({ id: 'w' + Date.now() + '_' + i, name: 'Вино №' + (i + 1), answers: {} });
  renderWines();
  openWine(i);
}
function rmWine(i) {
  if (!confirm('Удалить вино "' + ST.wines[i].name + '"?')) return;
  ST.wines.splice(i, 1);
  renderWines();
}
function renderWines() {
  const ec = ST.cats.filter(c => c.enabled);
  const list = $('wines-list');
  if (!list) return;
  list.innerHTML = ST.wines.map((w, i) => {
    const chips = ec.map(c => {
      const v = w.answers[c.id];
      return `<span class="answer-chip ${v ? 'set' : ''}">${esc(c.name)}: ${esc(v || '—')}</span>`;
    }).join('');
    return `<div class="wine-item">
      <div class="wine-item-head" onclick="openWine(${i})">
        <div class="wine-num-badge">${i + 1}</div>

  }).join('') || '<div style="text-align:center;padding:32px;color:rgba(245,240,232,.3);font-size:14px">Нажмите «+ Добавить вино»</div>';

  const allFilled = ST.wines.length > 0 && ST.wines.every(w =>
    ec.every(c => w.answers[c.id])
  );

function openWine(i) {

  $('wine-title').textContent = 'Вино №' + (i + 1);

  go('screen-wine');
}
function renderWineEditor() {

    <div class="f-group">
      <div class="lbl" style="margin-bottom:8px">Название</div>

      <div style="margin-bottom:18px">

function setAns(catId, ci, oi) {

  renderWineEditor();

  go('screen-setup');
  renderWines();
}

// ════════════════════════════════════════════════
//  CREATE SESSION
// ════════════════════════════════════════════════
async function createSession() {
  const name = $('sess-name').value.trim() || 'Wine Casino';
  const code = genCode();
  const payload = {
    code, name,
    cats: ST.cats.filter(c => c.enabled),
    wines: ST.wines,
    start_chips: ST.startChips,
    current_round: 1,
    phase: 'betting',
    players: {},
    bets: {},
    revealed: {}
  };
  const { error } = await SB.from('sessions').insert(payload);
  if (error) { toast('Ошибка: ' + error.message); return; }
  ST.role = 'host';
  ST.code = code;
  saveLS();
  $('h-code').textContent = code;
  go('screen-host');
  subHost();
  refreshHost();
}

// ════════════════════════════════════════════════
//  JOIN SESSION
// ════════════════════════════════════════════════
async function joinSession() {
  const code = $('join-code').value.trim().toUpperCase();
  const name = $('join-name').value.trim();
  if (code.length < 4) { toast('Введи код'); return; }
  if (!name) { toast('Введи имя'); return; }
  const sess = await dbGet(code);
  if (!sess) { toast('Сессия не найдена'); return; }
  if (sess.phase === 'finished') { toast('Игра уже завершена'); return; }
  const pid = genId();
  const players = { ...sess.players, [pid]: { name, chips: sess.start_chips } };
  await dbUpd({ players }, code);
  ST.role = 'player';
  ST.code = code;
  ST.pid = pid;
  ST.pname = name;
  ST.draft = {};
  ST.curRound = 0;
  ST.lastResultRound = 0;
  saveLS();
  $('p-name-hdr').textContent = name;
  go('screen-player');
  subPlayer();
  drawPlayer(await dbGet());
}


// ════════════════════════════════════════════════
//  REALTIME SUBSCRIPTIONS
// ════════════════════════════════════════════════
function subHost() {
  if (ST.channel) SB.removeChannel(ST.channel);
  ST.channel = SB.channel('h_' + ST.code)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'sessions', filter: 'code=eq.' + ST.code },
      p => refreshHost(p.new))
    .subscribe();
}
function subPlayer() {
  if (ST.channel) SB.removeChannel(ST.channel);
  ST.channel = SB.channel('p_' + ST.code + '_' + ST.pid)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'sessions', filter: 'code=eq.' + ST.code },
      p => drawPlayer(p.new))
    .subscribe();
}

// ════════════════════════════════════════════════
//  HOST UI
// ════════════════════════════════════════════════
async function refreshHost(sess) {
  if (!sess) sess = await dbGet();
  if (!sess) return;
  ST.lastSess = sess;
  const r = sess.current_round;
  const total = sess.wines.length;
  $('h-round-pill').textContent = 'Вино ' + r + '/' + total;
  const isRevealed = !!(sess.revealed || {})[r];
  $('h-reveal-btn').disabled = isRevealed;
  $('h-next-btn').disabled = !isRevealed;
  $('h-next-btn').textContent = r >= total ? 'Завершить →' : 'Дальше →';
  renderHostTab(sess);
}

function hTab(t) {
  ST.htab = t;
  document.querySelectorAll('.h-tab').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === "hTab('" + t + "')");
  });
  if (ST.lastSess) renderHostTab(ST.lastSess);
  else dbGet().then(s => { if (s) { ST.lastSess = s; renderHostTab(s); } });
}

function renderHostTab(sess) {
  const el = $('h-content');
  if (ST.htab === 'bets') el.innerHTML = hostBetsHTML(sess);
  else if (ST.htab === 'players') el.innerHTML = hostPlayersHTML(sess);
  else el.innerHTML = hostWinesHTML(sess);
}

function hostBetsHTML(sess) {
  const r = sess.current_round;
  const bets = (sess.bets || {})[r] || {};
  const players = sess.players || {};
  const cats = sess.cats || [];
  const wine = sess.wines[r - 1];
  const isRevealed = !!(sess.revealed || {})[r];

  const pCount = Object.keys(players).length;
  const bCount = Object.keys(bets).length;

  let h = `<div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gl);margin-bottom:2px">${esc(wine?.name || 'Вино №' + r)}</div>
    <div class="lbl" style="margin-bottom:12px">${isRevealed ? '✓ Ответы открыты' : 'Ставки: ' + bCount + '/' + pCount}</div>`;

  if (pCount === 0) {
    return h + '<div style="text-align:center;padding:40px 0;color:rgba(245,240,232,.3)">Ожидание игроков...</div>';
  }

  h += '<div style="overflow-x:auto"><table class="bets-table"><thead><tr><th>Игрок</th><th>🪙</th>';
  cats.forEach(c => { h += `<th>${esc(c.name)} <span class="mult">×${c.mult}</span></th>`; });
  h += '</tr></thead><tbody>';

  Object.entries(players).sort((a, b) => b[1].chips - a[1].chips).forEach(([pid, p]) => {
    const pb = bets[pid] || {};
    h += `<tr><td style="font-size:13px;white-space:nowrap">${esc(p.name)}</td>
      <td style="font-family:'Cormorant Garamond',serif;color:var(--gold)">${p.chips}</td>`;
    cats.forEach(cat => {
      const bet = pb[cat.id];
      if (!bet) {
        h += `<td style="color:rgba(245,240,232,.2)">—</td>`;
        return;
      }
      let mark = '';
      if (isRevealed) {
        const ans = wine.answers[cat.id];
        mark = bet.sel === ans
          ? '<span style="color:var(--win)"> ✓</span>'
          : '<span style="color:var(--lose)"> ✗</span>';
      }
      h += `<td>
        <div style="font-size:12px">${esc(bet.sel)}${mark}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--gold)">🪙${bet.amt}</div>
      </td>`;
    });
    h += '</tr>';
  });
  return h + '</tbody></table></div>';
}

function hostPlayersHTML(sess) {
  const players = Object.entries(sess.players || {}).sort((a, b) => b[1].chips - a[1].chips);
  if (!players.length) return '<div style="text-align:center;padding:32px;color:rgba(245,240,232,.3)">Ожидание игроков...</div>';
  return '<div>' + players.map(([id, p], i) => `
    <div class="player-row">
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:rgba(201,168,76,.3);width:20px">${i + 1}</div>
      <div class="avatar" style="background:${avc(p.name)}">${esc(p.name[0].toUpperCase())}</div>
      <div style="flex:1;font-size:15px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">🪙 ${p.chips}</div>
    </div>`).join('') + '</div>';
}

function hostWinesHTML(sess) {
  const cur = sess.current_round;
  return '<div class="lbl" style="margin-bottom:12px">Все вина (только просмотр)</div>' +
    (sess.wines || []).map((w, i) => {
      const isRevealed = !!(sess.revealed || {})[i + 1];
      const isCurrent = (i + 1) === cur;
      return `<div class="wine-item" style="${isCurrent ? 'border-color:var(--gold)' : ''}">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="wine-num-badge">${i + 1}</div>
          <div style="flex:1;font-size:14px">${esc(w.name)}</div>
          ${isCurrent ? '<span class="round-pill">Сейчас</span>' : isRevealed ? '<span style="font-size:12px;color:var(--win)">✓ Открыто</span>' : '<span style="font-size:12px;color:rgba(245,240,232,.3)">Ожидание</span>'}
        </div>
        <div class="wine-answers">
          ${(sess.cats || []).map(c => `<span class="answer-chip set">${esc(c.name)}: ${esc(w.answers[c.id] || '—')}</span>`).join('')}
        </div>
      </div>`;
    }).join('');
}

// HOST ACTIONS
async function revealRound() {
  const sess = await dbGet();
  if (!sess) return;
  const r = sess.current_round;
  if ((sess.revealed || {})[r]) { toast('Уже открыто'); return; }
  const wine = sess.wines[r - 1];
  const cats = sess.cats || [];
  const players = { ...sess.players };
  const bets = (sess.bets || {})[r] || {};

  // Settle bets — for each player, for each cat bet, if correct, add amt*mult
  Object.entries(bets).forEach(([pid, pb]) => {
    if (!players[pid]) return;
    let earned = 0;
    cats.forEach(cat => {
      const bet = pb[cat.id];
      if (!bet) return;
      if (bet.sel === wine.answers[cat.id]) {
        earned += bet.amt * cat.mult;
      }
    });
    players[pid] = { ...players[pid], chips: players[pid].chips + earned };
  });

  const revealed = { ...sess.revealed, [r]: true };
  await dbUpd({ players, revealed, phase: 'revealed' });
  toast('✓ Ответы открыты');
}

async function nextRound() {
  const sess = await dbGet();
  if (!sess) return;
  if (sess.current_round >= sess.wines.length) {
    return endGame();
  }
  await dbUpd({ current_round: sess.current_round + 1, phase: 'betting' });
}

function confirmEndGame() {
  showDialog({
    title: 'Завершить игру?',
    text: 'Все игроки увидят финальную таблицу. Это действие нельзя отменить.',
    confirmText: 'Завершить',
    confirmDanger: true,
    onConfirm: endGame
  });
}

async function endGame() {
  await dbUpd({ phase: 'finished' });
  toast('🏆 Игра завершена!');
}

async function copyCode() {
  try { await navigator.clipboard.writeText(ST.code); } catch(e) {}
  toast('Код: ' + ST.code);
}


// ════════════════════════════════════════════════
//  PLAYER UI — fully reactive
// ════════════════════════════════════════════════

// Single source of truth — every render is a complete rebuild from `sess` state.
// Local state ST.draft is per-round and reset when round changes.
// Confirm overlay state is tracked separately and survives session updates.

function drawPlayer(sess) {
  if (!sess) return;
  ST.lastSess = sess;
  const me = (sess.players || {})[ST.pid];
  if (me) $('p-chips-hdr').textContent = me.chips;

  // Phase: finished
  if (sess.phase === 'finished') {
    closeConfirmOverlay();
    ST.curRound = sess.current_round;
    pView(finalHTML(sess), '');
    return;
  }

  const r = sess.current_round;
  // Always read bets fresh from the session object passed in
  const roundBets = (sess.bets || {})[r] || {};
  const myBets = roundBets[ST.pid] && Object.keys(roundBets[ST.pid]).length > 0
    ? roundBets[ST.pid]
    : null;
  const isRevealed = !!(sess.revealed || {})[r];

  // Round changed — reset local draft and close confirm
  if (r !== ST.curRound) {
    ST.draft = {};
    ST.curRound = r;
    closeConfirmOverlay();
  }

  // State machine — always fully re-render, no caching
  if (isRevealed) {
    showResult(sess, myBets, r, me);
  } else if (myBets) {
    showWaiting(sess, myBets, r, me);
  } else if (ST.inConfirm) {
    // Confirm overlay is on top — don't redraw betting behind it
    // but do update chips header (already done above)
  } else {
    showBetting(sess, me, r);
  }
}

function pView(html, extraClass) {
  const el = $('p-content');
  el.className = 'p-content' + (extraClass ? ' ' + extraClass : '');
  el.innerHTML = '<div class="p-view">' + html + '</div>';
}

function availChips(me) {
  if (!me) return 0;
  const draftTotal = Object.values(ST.draft).reduce((s, b) => s + (b.amt || 0), 0);
  return me.chips - draftTotal;
}

// ────────────── BETTING SCREEN ──────────────
function showBetting(sess, me, r) {
  const cats = sess.cats || [];
  const wine = sess.wines[r - 1];
  const myChips = me ? me.chips : 0;

  let h = `<div class="avail-bar">
    <div>
      <div class="avail-label">Доступно</div>
      <div class="avail-num" id="avail-num">🪙 ${myChips}</div>
    </div>
    <div style="text-align:right">
      <div class="avail-label">Вино ${r}/${sess.wines.length}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gl)">${esc(wine?.name || '')}</div>
    </div>
  </div>`;

  if (myChips === 0) {
    h += '<div style="background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:12px;padding:14px;margin-bottom:14px;text-align:center;font-size:14px;color:#e87c6e">У вас закончились фишки. Дождитесь следующих раундов или конца игры.</div>';
  } else {
    h += '<div class="lbl" style="margin-bottom:12px">Выберите ответ и сумму ставки в нужных категориях. Категории можно пропускать.</div>';
  }

  if (!cats.length) {
    h += '<div style="text-align:center;padding:40px;color:rgba(245,240,232,.4)">В этой игре нет активных категорий</div>';
    pView(h, '');
    return;
  }

  cats.forEach(cat => {
    const bs = ST.draft[cat.id] || { sel: null, amt: 0 };
    const isReady = bs.sel && bs.amt > 0;
    h += `<div class="cat-block${isReady ? ' done' : ''}" id="cb-${cat.id}">
      <div class="cat-block-head">
        <div class="cat-title">${esc(cat.name)} <span class="mult">×${cat.mult}</span></div>
        <div class="cat-stake-display" id="cbv-${cat.id}">${isReady ? '🪙' + bs.amt : (bs.sel ? esc(bs.sel) : '—')}</div>
      </div>
      <div class="opts-grid">
        ${cat.options.map(o => {
          const f = FLAGS[o];
          const sel = bs.sel === o ? ' sel' : '';
          return `<div class="opt${sel}" data-c="${attr(cat.id)}" data-o="${attr(o)}">${f ? `<img src="https://flagcdn.com/w40/${f}.png" alt="">` : ''} ${esc(o)}</div>`;
        }).join('')}
      </div>
      <div class="chips-row">
        <div class="chip c1" data-c="${attr(cat.id)}" data-v="1">1</div>
        <div class="chip c5" data-c="${attr(cat.id)}" data-v="5">5</div>
        <div class="chip c10" data-c="${attr(cat.id)}" data-v="10">10</div>
        <div class="chip c25" data-c="${attr(cat.id)}" data-v="25">25</div>
        <div class="chip c50" data-c="${attr(cat.id)}" data-v="50">50</div>
      </div>
      <div class="chip-foot">
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold)">🪙 <span id="sd-${cat.id}">${bs.amt}</span></div>
        <button class="btn-clr" onclick="clearCatDraft('${attr(cat.id)}')">Сброс</button>
      </div>
    </div>`;
  });

  h += `<button class="btn-gold" id="place-btn" onclick="openConfirm()" disabled style="margin-top:8px">Поставить →</button>`;

  pView(h, '');
  attachBettingHandlers();
  updatePlaceBtn();
  updateChipsAvailability();
}

function attachBettingHandlers() {
  // Use the p-content as delegate — survives any inner re-renders
  const content = $('p-content');
  if (!content) return;

  // Remove old delegates (clone trick — fastest way)
  const fresh = content.cloneNode(true);
  content.parentNode.replaceChild(fresh, content);
  // Re-query after replace
  const el = $('p-content');

  el.addEventListener('click', function(e) {
    // OPT button
    const optEl = e.target.closest('.opt');
    if (optEl && optEl.dataset.c) {
      const cid = optEl.dataset.c;
      const opt = optEl.dataset.o;
      if (!ST.draft[cid]) ST.draft[cid] = { sel: null, amt: 0 };
      ST.draft[cid].sel = opt;
      el.querySelectorAll(`.opt[data-c="${cid}"]`).forEach(o =>
        o.classList.toggle('sel', o.dataset.o === opt)
      );
      updateCatBlock(cid);
      return;
    }
    // CHIP button
    const chipEl = e.target.closest('.chip');
    if (chipEl && chipEl.dataset.c) {
      if (chipEl.classList.contains('disabled')) return;
      const cid = chipEl.dataset.c;
      const v = +chipEl.dataset.v;
      if (!ST.draft[cid]) ST.draft[cid] = { sel: null, amt: 0 };
      const me2 = (ST.lastSess?.players || {})[ST.pid];
      const avail = availChips(me2);
      if (v > avail) {
        toast('Недостаточно фишек (доступно ' + avail + ')');
        return;
      }
      ST.draft[cid].amt += v;
      updateCatBlock(cid);
      return;
    }
    // PLACE button
    if (e.target.id === 'place-btn' || e.target.closest('#place-btn')) {
      openConfirm();
    }
  });
}

function updateCatBlock(cid) {
  const bs = ST.draft[cid] || { sel: null, amt: 0 };
  const sd = $('sd-' + cid);
  if (sd) sd.textContent = bs.amt;
  const cbv = $('cbv-' + cid);
  if (cbv) cbv.textContent = (bs.sel && bs.amt > 0) ? '🪙' + bs.amt : (bs.sel ? bs.sel : '—');
  const cb = $('cb-' + cid);
  if (cb) cb.classList.toggle('done', !!(bs.sel && bs.amt > 0));
  updatePlaceBtn();
  updateChipsAvailability();
  updateAvailBar();
}

function updatePlaceBtn() {
  const btn = $('place-btn');
  if (!btn) return;
  const ok = Object.values(ST.draft).some(b => b.sel && b.amt > 0);
  btn.disabled = !ok;
}

function updateAvailBar() {
  const el = $('avail-num');
  if (!el) return;
  const me = (ST.lastSess?.players || {})[ST.pid];
  const avail = availChips(me);
  el.textContent = '🪙 ' + avail;
  el.classList.toggle('low', avail === 0);
}

function updateChipsAvailability() {
  const me = (ST.lastSess?.players || {})[ST.pid];
  const avail = availChips(me);
  document.querySelectorAll('.chip').forEach(el => {
    const v = +el.dataset.v;
    el.classList.toggle('disabled', v > avail);
  });
}

function clearCatDraft(cid) {
  delete ST.draft[cid];
  const me = (ST.lastSess?.players || {})[ST.pid];
  if (ST.lastSess) {
    showBetting(ST.lastSess, me, ST.lastSess.current_round);
  }
}

// ────────────── CONFIRM OVERLAY ──────────────
function openConfirm() {
  if (!ST.lastSess) return;
  const sess = ST.lastSess;
  const cats = sess.cats || [];
  const r = sess.current_round;
  const wine = sess.wines[r - 1];
  const bets = Object.entries(ST.draft).filter(([, b]) => b.sel && b.amt > 0);
  if (!bets.length) { toast('Сделайте хотя бы одну ставку'); return; }
  const total = bets.reduce((s, [, b]) => s + b.amt, 0);

  ST.inConfirm = true;

  const cards = bets.map(([cid, b]) => {
    const cat = cats.find(c => c.id === cid);
    return `<div class="confirm-card">
      <div class="confirm-cat-info">
        <div class="confirm-cat-lbl">${esc(cat?.name || cid)}</div>
        <div class="confirm-cat-sel">${esc(b.sel)}</div>
        <div class="confirm-cat-mult">×${cat?.mult || 2} при угадывании</div>
      </div>
      <div class="confirm-amt">🪙${b.amt}</div>
    </div>`;
  }).join('');

  const me = (sess.players || {})[ST.pid];
  const myChips = me ? me.chips : 0;
  const remaining = myChips - total;

  const ov = document.createElement('div');
  ov.id = 'confirm-overlay';
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="page-header">
      <button class="back" onclick="closeConfirmOverlay()">← Изменить</button>
      <div class="page-title">${esc(wine?.name || 'Вино №' + r)}</div>
    </div>
    <div class="overlay-scroll">
      <div class="lbl" style="margin-bottom:14px">Подтвердите ставки</div>
      ${cards}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid rgba(201,168,76,.12);margin-top:4px">
        <span style="font-size:14px;color:rgba(245,240,232,.5)">Итого ставка</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold)">🪙${total}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:rgba(245,240,232,.45);padding:6px 0">
        <span>Останется после ставки</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:18px;color:${remaining >= 0 ? 'var(--gold)' : 'var(--lose)'}">🪙${remaining}</span>
      </div>
    </div>
    <div class="overlay-footer">
      <button class="btn-ghost" style="flex:1" onclick="closeConfirmOverlay()">← Изменить</button>
      <button class="btn-gold" style="flex:2" onclick="confirmBets()">Подтвердить ✓</button>
    </div>`;
  document.body.appendChild(ov);
}

function closeConfirmOverlay() {
  ST.inConfirm = false;
  const ov = $('confirm-overlay');
  if (ov) ov.remove();
}

async function confirmBets() {
  // Re-fetch session to get fresh state (avoid stale chips)
  const sess = await dbGet();
  if (!sess) { toast('Ошибка соединения'); return; }
  const me = (sess.players || {})[ST.pid];
  if (!me) { toast('Ошибка: игрок не найден'); return; }
  const r = sess.current_round;

  // Verify still in betting phase
  if ((sess.revealed || {})[r]) { toast('Ответы уже открыты'); closeConfirmOverlay(); return; }

  // If bet already exists (somehow), don't double-spend
  if ((sess.bets || {})[r] && (sess.bets || {})[r][ST.pid]) {
    toast('Ставки уже приняты');
    closeConfirmOverlay();
    ST.draft = {};
    return;
  }

  const myBets = {};
  let spent = 0;
  Object.entries(ST.draft).forEach(([cid, b]) => {
    if (b.sel && b.amt > 0) {
      myBets[cid] = { sel: b.sel, amt: b.amt };
      spent += b.amt;
    }
  });
  if (spent === 0) { toast('Сделайте хотя бы одну ставку'); return; }
  if (spent > me.chips) { toast('Недостаточно фишек'); return; }

  const bets = { ...sess.bets };
  if (!bets[r]) bets[r] = {};
  bets[r] = { ...bets[r], [ST.pid]: myBets };

  const players = { ...sess.players, [ST.pid]: { ...me, chips: me.chips - spent } };

  // Optimistic: clear draft and overlay immediately so the realtime update doesn't fight us
  ST.draft = {};
  closeConfirmOverlay();

  await dbUpd({ bets, players });
  // Trigger immediate redraw with optimistic local state
  drawPlayer({ ...sess, bets, players });
}

// ────────────── WAITING (FELT) SCREEN ──────────────
function showWaiting(sess, myBets, r, me) {
  const wine = sess.wines[r - 1];
  const cats = sess.cats || [];

  const myCards = cats
    .filter(c => myBets && myBets[c.id])
    .map(c => {
      const b = myBets[c.id];
      return `<div class="felt-bet-card">
        <div class="felt-cat-lbl">${esc(c.name)} · ×${c.mult}</div>
        <div class="felt-cat-sel">${esc(b.sel)}</div>
        <div class="felt-cat-amt">🪙 ${b.amt}</div>
      </div>`;
    }).join('');

  const totalStake = Object.values(myBets || {}).reduce((s, b) => s + b.amt, 0);

  pView(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <div style="flex:1;min-width:0">
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(wine?.name || 'Вино №' + r)}</div>
        <div class="lbl" style="margin-top:2px">Ставки приняты · Ожидаем ответа</div>
      </div>
      <div class="spinner"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="lbl">Ваши ставки</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold)">Всего: 🪙${totalStake}</div>
    </div>
    ${myCards || '<div style="color:rgba(245,240,232,.3);text-align:center;padding:20px;font-size:14px">Без ставок</div>'}
    <div id="waiting-others">${buildOthersHTML(sess, r)}</div>
  `, 'felt-bg');
}

function refreshWaitingOthers(sess, r) {
  const el = $('waiting-others');
  if (el) el.innerHTML = buildOthersHTML(sess, r);
}

function buildOthersHTML(sess, r) {
  const roundBets = (sess.bets || {})[r] || {};
  const players = sess.players || {};
  const others = Object.entries(players).filter(([pid]) => pid !== ST.pid);
  if (!others.length) return '';
  let h = `<div class="others-panel"><div class="others-title">Другие игроки</div>`;
  others.forEach(([pid, p]) => {
    const pb = roundBets[pid];
    if (pb && Object.keys(pb).length > 0) {
      const tags = Object.entries(pb).map(([cid, bet]) => {
        const cat = (sess.cats || []).find(c => c.id === cid);
        return `<span class="other-tag">${esc(cat?.name || cid)}: ${esc(bet.sel)} 🪙${bet.amt}</span>`;
      }).join('');
      h += `<div class="other-row">
        <div class="other-name">${esc(p.name)}</div>
        <div class="other-tags">${tags}</div>
      </div>`;
    } else {
      h += `<div class="other-row">
        <div class="other-name">${esc(p.name)}</div>
        <div class="other-tags"><span style="font-size:11px;color:rgba(245,240,232,.2)">думает...</span></div>
      </div>`;
    }
  });
  return h + '</div>';
}

// ────────────── RESULT SCREEN ──────────────
function showResult(sess, myBets, r, me) {
  const wine = sess.wines[r - 1];
  const cats = sess.cats || [];

  let earned = 0, lost = 0, betCount = 0;
  cats.forEach(cat => {
    const myBet = myBets ? myBets[cat.id] : null;
    if (!myBet) return;
    betCount++;
    if (myBet.sel === wine.answers[cat.id]) earned += myBet.amt * cat.mult;
    else lost += myBet.amt;
  });
  const net = earned - lost;

  const cards = cats.map((cat, i) => {
    const ans = wine.answers[cat.id];
    const myBet = myBets ? myBets[cat.id] : null;
    const won = myBet && myBet.sel === ans;
    const nobet = !myBet;
    const cls = nobet ? 'nobet' : won ? 'win' : 'lose';
    const icon = nobet ? '🤷' : won ? '🎉' : '😔';
    let earnTxt = '';
    if (myBet) {
      earnTxt = won ? `+🪙${myBet.amt * cat.mult}` : `−🪙${myBet.amt}`;
    }
    return `<div class="result-card ${cls}" style="animation-delay:${i * 0.1}s">
      <div class="result-icon">${icon}</div>
      <div class="result-info">
        <div class="result-lbl">${esc(cat.name)} · ×${cat.mult}</div>
        <div class="result-ans">${esc(ans || '—')}</div>
        ${myBet
          ? `<div class="result-yours">Вы: ${esc(myBet.sel)} · 🪙${myBet.amt}</div>`
          : '<div class="result-yours" style="color:rgba(245,240,232,.25)">Не ставили</div>'}
      </div>
      ${earnTxt ? `<div class="result-earn ${won ? 'win' : 'lose'}">${earnTxt}</div>` : ''}
    </div>`;
  }).join('');

  const totalLabel = net > 0 ? 'Чистый выигрыш' : net < 0 ? 'Чистый проигрыш' : 'Без изменений';
  const totalColor = net > 0 ? 'var(--win)' : net < 0 ? 'var(--lose)' : 'var(--gold)';
  const totalDisp = net > 0 ? `+🪙${net}` : net < 0 ? `−🪙${Math.abs(net)}` : `🪙 0`;

  pView(`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);margin-bottom:2px">${esc(wine?.name || 'Вино №' + r)}</div>
      <div class="lbl">Результаты раунда ${r}/${sess.wines.length}</div>
    </div>
    ${cards}
    ${betCount > 0 ? `<div class="total-box">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.35);margin-bottom:8px">${totalLabel}</div>
      <div class="total-num" style="color:${totalColor}">${totalDisp}</div>
      <div style="font-size:14px;color:rgba(245,240,232,.45);margin-top:8px">Баланс: 🪙${me ? me.chips : '—'}</div>
    </div>` : `<div class="total-box">
      <div style="font-size:14px;color:rgba(245,240,232,.4)">Вы не сделали ставок в этом раунде</div>
      <div style="font-size:13px;color:rgba(245,240,232,.3);margin-top:4px">Баланс: 🪙${me ? me.chips : '—'}</div>
    </div>`}
    ${lbSmallHTML(sess)}
    <div style="margin-top:18px;text-align:center;font-size:13px;color:rgba(245,240,232,.35)">
      ${r >= sess.wines.length ? 'Ожидаем завершения игры...' : 'Ожидаем следующего вина...'}
    </div>
  `, 'felt-bg');

  if (earned > 0 && ST.lastResultRound !== r) {
    setTimeout(() => flyChips(earned), 400);
  }
  ST.lastResultRound = r;
}


function flyChips(amount) {
  const n = Math.min(Math.ceil(amount / 15), 14);
  const balanceEl = $('p-chips-hdr');
  const targetRect = balanceEl ? balanceEl.getBoundingClientRect() : null;
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'chip-fly';
      el.textContent = '🪙';
      const startX = 25 + Math.random() * 50; // % of viewport
      const startY = 55; // %
      let tx, ty;
      if (targetRect) {
        const startPxX = window.innerWidth * (startX / 100);
        const startPxY = window.innerHeight * (startY / 100);
        tx = (targetRect.left + targetRect.width / 2) - startPxX;
        ty = (targetRect.top + targetRect.height / 2) - startPxY;
      } else {
        tx = (Math.random() - 0.5) * 200;
        ty = -(100 + Math.random() * 250);
      }
      el.style.cssText = `left:${startX}%;top:${startY}%;--tx:${tx}px;--ty:${ty}px;animation-delay:${Math.random() * 0.4}s`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 70);
  }
}

function lbSmallHTML(sess) {
  const sorted = Object.entries(sess.players || {}).sort((a, b) => b[1].chips - a[1].chips);
  return `<div class="div"></div>
    <div class="lbl" style="margin-bottom:10px">Рейтинг</div>
    <div class="lb">${sorted.map(([id, p], i) => `
      <div class="lb-row ${id === ST.pid ? 'me' : ''}">
        <div class="lb-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
        <div class="avatar" style="background:${avc(p.name)};width:28px;height:28px;font-size:12px">${esc(p.name[0].toUpperCase())}</div>
        <div style="flex:1;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${id === ST.pid ? ' <span style="font-size:11px;opacity:.45">(вы)</span>' : ''}</div>
        <div class="lb-chips">🪙 ${p.chips}</div>
      </div>`).join('')}
    </div>`;
}

// ════════════════════════════════════════════════
//  PLAYER — FINAL SCREEN
// ════════════════════════════════════════════════
function finalHTML(sess) {
  const sorted = Object.entries(sess.players || {}).sort((a, b) => b[1].chips - a[1].chips);
  const winner = sorted[0];
  return `<div style="text-align:center;padding:32px 0 16px">
    <div class="crown">🏆</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold);margin-bottom:6px">Игра завершена!</div>
    <div style="font-size:14px;color:rgba(245,240,232,.4);margin-bottom:6px">${esc(sess.name)}</div>
    ${winner ? `<div style="font-size:15px;color:rgba(245,240,232,.7);margin-top:8px">Победитель:<br><strong style="color:var(--gl);font-family:'Cormorant Garamond',serif;font-size:22px">${esc(winner[1].name)}</strong></div>` : ''}
  </div>
  <div class="div"></div>
  <div class="lbl" style="margin-bottom:12px">Итоговая таблица</div>
  <div class="lb">
    ${sorted.map(([id, p], i) => `
      <div class="lb-row ${i === 0 ? 'winner' : ''} ${id === ST.pid ? 'me' : ''}">
        <div class="lb-rank ${i < 3 ? 'top' : ''}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</div>
        <div class="avatar" style="background:${avc(p.name)};width:32px;height:32px;font-size:14px">${esc(p.name[0].toUpperCase())}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${id === ST.pid ? ' <span style="font-size:11px;opacity:.45">(вы)</span>' : ''}</div>
          ${i === 0 ? '<div style="font-size:11px;color:var(--gold);margin-top:2px">Победитель!</div>' : ''}
        </div>
        <div class="lb-chips">🪙 ${p.chips}</div>
      </div>`).join('')}
  </div>
  <div style="height:20px"></div>
  <button class="btn-ghost" onclick="leaveSession()" style="width:100%">Выйти →</button>`;
}

function leaveSession() {
  clearLS();
  if (ST.channel) SB.removeChannel(ST.channel);
  ST.channel = null;
  // Reset state
  Object.assign(ST, {
    role: null, code: null, pid: null, pname: null,
    draft: {}, curRound: 0, lastResultRound: 0, inConfirm: false,
    lastSess: null
  });
  $('resume-box').innerHTML = '';
  go('screen-landing');
}

// ════════════════════════════════════════════════
//  DIALOG
// ════════════════════════════════════════════════
function showDialog({ title, text, confirmText, cancelText, confirmDanger, onConfirm }) {
  const c = $('dialog-container');
  c.innerHTML = `<div class="dialog-overlay" onclick="if(event.target===this)closeDialog()">
    <div class="dialog">
      <h3>${esc(title)}</h3>
      <p>${esc(text)}</p>
      <div class="dialog-btns">
        <button class="btn-ghost" style="flex:1" onclick="closeDialog()">${esc(cancelText || 'Отмена')}</button>
        <button class="btn-gold" style="flex:1;${confirmDanger ? 'background:var(--lose);color:#fff' : ''}" id="dialog-ok">${esc(confirmText || 'OK')}</button>
      </div>
    </div>
  </div>`;
  $('dialog-ok').onclick = () => { closeDialog(); onConfirm && onConfirm(); };
}
function closeDialog() { $('dialog-container').innerHTML = ''; }

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  renderWines();
  go('screen-landing');
  await checkResume();
});

// Handle visibility change — re-fetch on tab focus
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && ST.code) {
    const sess = await dbGet();
    if (!sess) return;
    if (ST.role === 'host') refreshHost(sess);
    else drawPlayer(sess);
  }
});

</script>
</body>
</html>
