<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Wine Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--g:#1a3a2a;--felt:#1e4430;--gold:#c9a84c;--gl:#e8c97a;--cream:#f5f0e8;--red:#7a1b2e;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--g);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.08),transparent 55%);pointer-events:none;z-index:0}
.screen{display:none;position:fixed;inset:0;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex;flex-direction:column;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.4)}
input[type=text],input[type=number]{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.2);border-radius:12px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 16px;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--gold)}
.btn-gold{background:var(--gold);color:var(--g);border:none;border-radius:14px;padding:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;width:100%;transition:background .15s}
.btn-gold:active{background:var(--gl)}
.btn-gold:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gl);cursor:pointer;white-space:nowrap}
.btn-sm:active{background:rgba(201,168,76,.22)}
.btn-sm:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:12px 18px;color:rgba(245,240,232,.6);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.btn-ghost:active{border-color:var(--gold);color:var(--gl)}
.btn-danger{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:#e87c6e;cursor:pointer}
.back{background:none;border:none;color:rgba(245,240,232,.4);font-size:15px;cursor:pointer;padding:4px 0}
.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.page-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gl);flex:1}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(20px + var(--safe))}
.f-group{margin-bottom:18px}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--gl)}
.tag .x{cursor:pointer;color:rgba(201,168,76,.5);font-size:15px;line-height:1}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:10px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--cream);min-height:44px;display:flex;align-items:center}
.pill.sel,.pill:active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gl)}
.mult{display:inline-block;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--gl)}
.spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(18px + var(--safe));left:50%;transform:translateX(-50%);background:rgba(18,46,28,.97);border:1px solid var(--gold);border-radius:12px;padding:12px 22px;font-size:14px;color:var(--cream);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1}
::-webkit-scrollbar{display:none}
.div{height:1px;background:rgba(201,168,76,.1);margin:16px 0}
.add-opt-row{display:flex;gap:8px}
.add-opt-row input{flex:1}

/* LANDING */
#screen-landing{justify-content:center;align-items:center;padding:40px 24px}
.logo{font-family:'Cormorant Garamond',serif;font-size:clamp(58px,16vw,96px);font-weight:600;color:var(--gold);text-align:center;line-height:.88;letter-spacing:-2px}
.logo-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(245,240,232,.3);text-align:center;margin:10px 0 44px}
.role-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px}
.role-card{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:22px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;min-height:76px}
.role-card:active{background:rgba(201,168,76,.1);border-color:var(--gold)}
.role-icon{font-size:34px;flex-shrink:0}
.role-title{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--gl)}
.role-desc{font-size:13px;color:rgba(245,240,232,.4);margin-top:2px}

/* WINE LIST */
.wine-item{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.wine-item-head{display:flex;align-items:center;gap:10px;cursor:pointer}
.wine-num-badge{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);width:28px;flex-shrink:0}
.wine-answers{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(201,168,76,.1)}
.answer-chip{font-size:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 10px;color:rgba(245,240,232,.5)}
.answer-chip.set{border-color:rgba(201,168,76,.3);color:var(--gl)}
.rev-opt{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:13px;color:var(--cream);min-height:40px;display:flex;align-items:center}
.rev-opt.sel{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gl)}
.rev-opt:active{background:rgba(201,168,76,.1)}

/* HOST GAME */
#screen-host{padding:0}
.h-topbar{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;gap:10px;flex-shrink:0}
.h-code-btn{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);letter-spacing:5px;cursor:pointer;background:none;border:none;padding:0}
.round-pill{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:5px 12px;font-size:13px;color:var(--gl);white-space:nowrap}
.h-tabs{display:flex;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.h-tab{flex:1;padding:12px 6px;font-size:13px;color:rgba(245,240,232,.35);cursor:pointer;border-bottom:2px solid transparent;text-align:center}
.h-tab.active{color:var(--gl);border-bottom-color:var(--gold)}
.h-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.h-bottom{display:flex;padding:10px 14px;padding-bottom:calc(10px + var(--safe));border-top:1px solid rgba(201,168,76,.12);gap:10px;flex-shrink:0}
.bets-table{width:100%;border-collapse:collapse;font-size:13px}
.bets-table th{text-align:left;padding:8px 10px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.35);border-bottom:1px solid rgba(201,168,76,.1);font-weight:400}
.bets-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.bets-table tr:last-child td{border-bottom:none}
.reveal-cat{margin-bottom:14px}
.reveal-cat-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.35);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.player-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.player-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}

/* PLAYER */
#screen-player{padding:0}
.p-header{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;gap:12px;flex-shrink:0}
.p-name{font-size:14px;color:rgba(245,240,232,.5);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-chips{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold)}
.p-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(20px + var(--safe))}

/* LOBBY */
.lobby-box{text-align:center;padding:40px 0}
.lobby-code{font-family:'Cormorant Garamond',serif;font-size:50px;color:var(--gold);letter-spacing:10px;margin:10px 0 4px}

/* BETTING — category blocks */
.cat-block{background:rgba(0,0,0,.18);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:14px;margin-bottom:12px;transition:border-color .2s}
.cat-block.done{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.05)}
.cat-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cat-block-title{font-size:14px;font-weight:500}
.opts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin-bottom:10px}
.opt{border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.12);min-height:44px;transition:all .15s}
.opt:active,.opt.sel{border-color:var(--gold);background:rgba(201,168,76,.13);color:var(--gl)}
.opt img{width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0}
.chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chip{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);flex-shrink:0;transition:transform .1s}
.chip:active{transform:scale(.88)}
.c1{background:#d5d8dc;color:#333;border-color:#aaa}
.c5{background:#c0392b;color:#fff;border-color:#e74c3c}
.c10{background:#2471a3;color:#fff;border-color:#3498db}
.c25{background:#1e8449;color:#fff;border-color:#2ecc71}
.c50{background:#2c3e50;color:#fff;border-color:#7f8c8d}
.chip-row-bottom{display:flex;align-items:center;gap:8px;margin-top:4px}
.stake-display{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);min-width:50px}
.btn-clr{background:none;border:none;color:rgba(245,240,232,.3);font-size:12px;cursor:pointer;text-decoration:underline;padding:4px}

/* CONFIRM SCREEN (overlay style) */
.confirm-overlay{position:fixed;inset:0;z-index:50;background:var(--g);display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .2s ease}
.confirm-overlay .scroll{padding-bottom:calc(100px + var(--safe))}
.confirm-footer{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;padding-bottom:calc(14px + var(--safe));background:rgba(20,50,32,.97);border-top:1px solid rgba(201,168,76,.15);display:flex;gap:10px;z-index:51}

/* FELT / WAITING SCREEN */
.felt-screen{position:fixed;inset:0;z-index:40;background:var(--felt);display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .3s ease}
.felt-screen::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(0,0,0,.04) 30px,rgba(0,0,0,.04) 31px);pointer-events:none}
.felt-header{padding:14px 16px;border-bottom:1px solid rgba(201,168,76,.15);display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;z-index:1}
.felt-content{flex:1;padding:16px;position:relative;z-index:1;overflow-y:auto}
/* bet card on felt */
.felt-bet-card{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.felt-cat-name{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(201,168,76,.5);margin-bottom:6px}
.felt-cat-sel{font-size:17px;font-weight:500;color:var(--cream);margin-bottom:4px}
.felt-cat-amt{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}
/* others on felt */
.others-felt{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-bottom:14px}
.others-felt-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.3);margin-bottom:10px}
.other-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.other-row:last-child{border-bottom:none}
.other-name{font-size:13px;width:72px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.other-chips-list{flex:1;display:flex;flex-wrap:wrap;gap:4px}
.other-chip-tag{font-size:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:3px 8px;color:rgba(245,240,232,.55)}

/* RESULT ANIMATION SCREEN */
.result-screen{position:fixed;inset:0;z-index:60;background:var(--felt);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .3s ease}
.result-screen::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(0,0,0,.04) 30px,rgba(0,0,0,.04) 31px);pointer-events:none}
.result-wine-title{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);text-align:center;margin-bottom:4px}
.result-cards-wrap{width:100%;padding:0 16px;position:relative;z-index:1}
.result-cat-card{border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;animation:cardIn .4s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-cat-card.win{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.35)}
.result-cat-card.lose{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.25)}
.result-cat-card.nobet{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07)}
.result-cat-icon{font-size:28px;flex-shrink:0}
.result-cat-info{flex:1}
.result-cat-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:3px}
.result-cat-answer{font-size:16px;font-weight:500}
.result-cat-yours{font-size:12px;color:rgba(245,240,232,.4);margin-top:2px}
.result-cat-earn{font-family:'Cormorant Garamond',serif;font-size:24px;text-align:right}
.result-cat-earn.win{color:#2ecc71}
.result-cat-earn.lose{color:#e74c3c}
/* flying chips animation */
.chip-fly{position:fixed;font-size:24px;pointer-events:none;z-index:100;animation:chipFly 1.2s ease-out forwards}
@keyframes chipFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3)}}
/* total earned */
.total-earned{text-align:center;padding:20px;position:relative;z-index:1}
.total-earned-num{font-family:'Cormorant Garamond',serif;font-size:56px;color:var(--gold);animation:popIn .5s .8s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* LEADERBOARD FINAL */
.lb{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.12);border-radius:14px;overflow:hidden}
.lb-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);gap:10px}
.lb-row:last-child{border-bottom:none}
.lb-row.winner{background:rgba(201,168,76,.08);border-left:3px solid var(--gold)}
.lb-row.me{background:rgba(201,168,76,.05)}
.lb-rank{font-family:'Cormorant Garamond',serif;font-size:20px;color:rgba(201,168,76,.3);width:22px}
.lb-rank.top{color:var(--gold)}
.lb-chips{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)}
.winner-crown{font-size:40px;text-align:center;margin-bottom:8px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
</style>
</head>
<body>

<!-- LANDING -->
<div id="screen-landing" class="screen">
  <div class="logo">Wine<br>Casino</div>
  <div class="logo-sub">Слепая дегустация · Ставки</div>
  <div class="role-cards">
    <div class="role-card" onclick="go('screen-setup')">
      <div class="role-icon">🎩</div>
      <div><div class="role-title">Организатор</div><div class="role-desc">Настроить вина и запустить игру</div></div>
    </div>
    <div class="role-card" onclick="go('screen-join')">
      <div class="role-icon">🍷</div>
      <div><div class="role-title">Игрок</div><div class="role-desc">Войти по коду и делать ставки</div></div>
    </div>
  </div>
</div>

<!-- HOST SETUP -->
<div id="screen-setup" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-landing')">← Назад</button>
    <div class="page-title">Настройка игры</div>
    <button class="btn-sm" onclick="openCatsEditor()">Категории</button>
  </div>
  <div class="scroll">
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Название сессии</div><input type="text" id="sess-name" value="Вечер с друзьями"></div>
    <div class="f-group">
      <div class="lbl" style="margin-bottom:8px">Стартовые фишки</div>
      <div class="pill-row" id="chips-pills">
        <div class="pill" onclick="selPill(this,'chips',100)">100</div>
        <div class="pill sel" onclick="selPill(this,'chips',200)">200</div>
        <div class="pill" onclick="selPill(this,'chips',500)">500</div>
        <div class="pill" onclick="selPill(this,'chips',1000)">1000</div>
      </div>
    </div>
    <div class="div"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="lbl">Вина в игре</div>
      <button class="btn-sm" onclick="addWine()">+ Добавить вино</button>
    </div>
    <div id="wines-list"></div>
    <div style="height:16px"></div>
    <button class="btn-gold" id="start-btn" onclick="createSession()" disabled>Запустить игру →</button>
  </div>
</div>

<!-- CATEGORIES EDITOR -->
<div id="screen-setup-cats" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-setup')">← Назад</button>
    <div class="page-title">Категории</div>
  </div>
  <div class="scroll" id="cats-editor"></div>
</div>

<!-- WINE EDITOR -->
<div id="screen-wine-editor" class="screen">
  <div class="page-header">
    <button class="back" onclick="saveWineAndBack()">← К списку</button>
    <div class="page-title" id="wine-editor-title">Вино №1</div>
  </div>
  <div class="scroll" id="wine-editor-body"></div>
</div>

<!-- JOIN -->
<div id="screen-join" class="screen">
  <div class="page-header">
    <button class="back" onclick="go('screen-landing')">← Назад</button>
    <div class="page-title">Войти в игру</div>
  </div>
  <div class="scroll">
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Код сессии</div>
      <input type="text" id="join-code" placeholder="ABC123" maxlength="6" style="text-align:center;font-size:28px;letter-spacing:8px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" autocomplete="off" autocapitalize="characters">
    </div>
    <div class="f-group"><div class="lbl" style="margin-bottom:8px">Ваше имя</div><input type="text" id="join-name" placeholder="Как тебя зовут?" autocomplete="given-name"></div>
    <button class="btn-gold" onclick="joinSession()">Присоединиться →</button>
  </div>
</div>

async function createSession(){
  const name=document.getElementById('sess-name').value.trim()||'Wine Casino';
  const code=genCode();
  const{error}=await sb.from('sessions').insert({
    code,name,cats:ST.cats.filter(c=>c.enabled),wines:ST.wines,
    start_chips:_chips,current_round:1,phase:'betting',

  });

  ST.role='host';ST.code=code;
  document.getElementById('h-code').textContent=code;
  go('screen-host');subHost();await refreshHost();
}

// ── JOIN ──
async function joinSession(){
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  const name=document.getElementById('join-name').value.trim();
  if(code.length<4){toast('Введи код');return}
  if(!name){toast('Введи имя');return}
  const{data:sess,error}=await sb.from('sessions').select('*').eq('code',code).single();
  if(error||!sess){toast('Сессия не найдена');return}
  if(sess.phase==='finished'){toast('Игра завершена');return}
  const pid=genId();
  const players=sess.players||{};
  players[pid]={name,chips:sess.start_chips};
  await sb.from('sessions').update({players}).eq('code',code);
  ST.role='player';ST.code=code;ST.pid=pid;ST.pname=name;ST.betDraft={};ST.lastRound=0;
  document.getElementById('p-name-hdr').textContent=name;
  go('screen-player');subPlayer();renderPlayer(sess);
}

function hostBetsHTML(sess){
  const r=sess.current_round,bets=(sess.bets||{})[r]||{},players=sess.players||{},cats=sess.cats||[],revealed=(sess.revealed||{})[r]||{};

    <div class="lbl" style="margin-bottom:12px">Ставки: ${Object.keys(bets).length} из ${Object.keys(players).length}</div>
    <div style="overflow-x:auto"><table class="bets-table"><thead><tr><th>Игрок</th><th>🪙</th>`;

      const bet=pb[cat.id],ans=revealed[cat.id];
      if(!bet){h+=`<td style="color:rgba(245,240,232,.2)">—</td>`;return}
      const mark=ans?(bet.sel===ans?'<span style="color:#2ecc71"> ✓</span>':'<span style="color:#e74c3c"> ✗</span>'):'';
      h+=`<td><div style="font-size:12px">${esc(bet.sel)}${mark}</div><div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold)">🪙${bet.amt}</div></td>`;
    });
    h+='</tr>';
  });
  return h+'</tbody></table></div>';
}
function hostRevealHTML(sess){
  const r=sess.current_round,wine=sess.wines[r-1],cats=sess.cats||[],revealed=(sess.revealed||{})[r]||{};
  let h=`<div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gl);margin-bottom:16px">${esc(wine?.name||'Вино №'+r)}</div>`;
  cats.forEach(cat=>{
    const ans=revealed[cat.id];
    h+=`<div class="reveal-cat"><div class="reveal-cat-lbl">${esc(cat.name)} <span class="mult">×${cat.mult}</span></div>`;
    if(ans){
      h+=`<div style="color:var(--gl);font-size:14px">✓ ${esc(ans)}</div>`;
    } else {
      h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px" data-cat="${cat.id}">${cat.options.map(o=>`<div class="rev-opt" data-l="${esc2(o)}">${esc(o)}</div>`).join('')}</div>
        <button class="btn-sm" onclick="revealCat('${cat.id}')">Открыть ответ</button>`;
    }
    h+=`</div><div class="div"></div>`;
  });
  return h;
}
function attachRevealHandlers(sess){
  const r=sess.current_round,revealed=(sess.revealed||{})[r]||{};
  document.querySelectorAll('[data-cat]').forEach(container=>{
    const catId=container.dataset.cat;
    if(!catId||revealed[catId])return;
    container.querySelectorAll('.rev-opt').forEach(btn=>{
      btn.onclick=()=>{container.querySelectorAll('.rev-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');ST.revSels[catId]=btn.dataset.l};
    });
  });
}
async function revealCat(catId){
  const sel=ST.revSels[catId];if(!sel){toast('Выбери правильный ответ');return}
  const{data:sess}=await sb.from('sessions').select('*').eq('code',ST.code).single();
  const r=sess.current_round,revealed=sess.revealed||{};
  if(!revealed[r])revealed[r]={};
  revealed[r][catId]=sel;
  const players=sess.players||{},bets=(sess.bets||{})[r]||{};
  const cat=(sess.cats||[]).find(c=>c.id===catId),mult=cat?.mult||2;
  Object.entries(bets).forEach(([pid,pb])=>{
    const bet=pb[catId];
    if(bet&&players[pid]&&bet.sel===sel)players[pid].chips+=bet.amt*mult;
  });
  await sb.from('sessions').update({revealed,players}).eq('code',ST.code);
  delete ST.revSels[catId];
  toast('✓ '+esc(cat?.name)+': '+esc(sel)+' (×'+mult+')');
}
function hostPlayersHTML(sess){
  const players=Object.entries(sess.players||{}).sort((a,b)=>b[1].chips-a[1].chips);

    <div class="avatar" style="background:${avc(p.name)}">${p.name[0].toUpperCase()}</div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">🪙 ${p.chips}</div>
  </div>`).join('')+'</div>';
}

  ST.revSels={};

// ══════════════════════════════════════════════
//  PLAYER UI  — overlays stacked on top of base screen
// ══════════════════════════════════════════════
let playerOverlay=null; // current overlay element

function removeOverlay(){
  if(playerOverlay){playerOverlay.remove();playerOverlay=null}
}

function showOverlay(html,cls='confirm-overlay'){
  removeOverlay();
  const el=document.createElement('div');
  el.className=cls;
  el.innerHTML=html;
  document.body.appendChild(el);
  playerOverlay=el;
  return el;
}

function renderPlayer(sess){
  if(!sess)return;
  const me=(sess.players||{})[ST.pid];
  if(me)document.getElementById('p-chips-hdr').textContent=me.chips;
  const r=sess.current_round;

  if(sess.phase==='finished'){
    removeOverlay();
    document.getElementById('p-content').innerHTML='';
    showFinalScreen(sess);
    return;
  }

  // Round changed — only proceed if player pressed "ready"
  if(r!==ST.lastRound){
    // If result screen is showing, wait for player to press ready
    const rs=document.getElementById('result-screen-id');
    if(rs)return; // still on previous result screen — don't auto-advance
    ST.betDraft={};
    ST.lastRound=r;
    ST.readyForNext=false;
    removeOverlay();
  }

  const myBets=((sess.bets||{})[r]||{})[ST.pid]||null;
  const revealed=(sess.revealed||{})[r]||{};
  const hasAnyReveal=Object.keys(revealed).length>0;

  // Results available — show or update result screen
  if(myBets&&hasAnyReveal){
    const existingResult=document.getElementById('result-screen-id');
    if(!existingResult){
      showResultScreen(sess,myBets,revealed,r,me);
    } else {
      updateResultScreen(sess,myBets,revealed,r,me);
    }
    return;
  }

  // Bets confirmed, waiting for reveal — show felt screen
  if(myBets){
    const existingFelt=document.getElementById('felt-screen-id');
    if(!existingFelt||!playerOverlay){
      showFeltScreen(sess,myBets,r,me);
    } else {
      updateFeltOthers(sess,r);
    }
    return;
  }

  // Confirm screen open — don't touch
  const existingConfirm=document.getElementById('confirm-screen-id');
  if(existingConfirm)return;
  renderBettingUI(sess,me,r);
}

function renderBettingUI(sess,me,r){
  removeOverlay();
  const cats=sess.cats||[],wine=sess.wines[r-1];
  let html=`<div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gl);margin-bottom:4px">${esc(wine?.name||'Вино №'+r)}</div>
    <div class="lbl" style="margin-bottom:16px">Раунд ${r} из ${sess.wines.length} · Делайте ставки</div>`;
  cats.forEach(cat=>{
    const bs=ST.betDraft[cat.id]||{sel:null,amt:0};
    html+=`<div class="cat-block ${bs.sel?'done':''}" id="cb-${cat.id}">
      <div class="cat-block-head">
        <div class="cat-block-title">${esc(cat.name)} <span class="mult">×${cat.mult}</span></div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold)" id="cbh-${cat.id}">${bs.sel?'🪙'+bs.amt:'—'}</div>
      </div>
      <div class="opts-grid">
        ${cat.options.map(o=>{const f=FLAGS[o];return`<div class="opt ${bs.sel===o?'sel':''}" data-cat="${cat.id}" data-opt="${esc2(o)}">${f?`<img src="https://flagcdn.com/w40/${f}.png" alt="">`:''} ${esc(o)}</div>`}).join('')}
      </div>
      <div class="chips-row">
        <div class="chip c1" data-cat="${cat.id}" data-v="1">1</div>
        <div class="chip c5" data-cat="${cat.id}" data-v="5">5</div>
        <div class="chip c10" data-cat="${cat.id}" data-v="10">10</div>
        <div class="chip c25" data-cat="${cat.id}" data-v="25">25</div>
        <div class="chip c50" data-cat="${cat.id}" data-v="50">50</div>
      </div>
      <div class="chip-row-bottom">
        <div class="stake-display" id="sd-${cat.id}">🪙${bs.amt}</div>
        <button class="btn-clr" onclick="clearDraft('${cat.id}')">Сброс</button>
      </div>
    </div>`;
  });
  html+=`<button class="btn-gold" id="p-confirm-btn" onclick="openConfirmScreen()" disabled style="margin-top:4px">Поставить →</button>`;
  document.getElementById('p-content').innerHTML=html;
  // attach handlers
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      const catId=el.dataset.cat,opt=el.dataset.opt;
      if(!ST.betDraft[catId])ST.betDraft[catId]={sel:null,amt:0};
      ST.betDraft[catId].sel=opt;
      document.querySelectorAll('.opt[data-cat="'+catId+'"]').forEach(o=>o.classList.toggle('sel',o.dataset.opt===opt));
      refreshCatBlock(catId,me);
    });
  });
  document.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click',()=>{
      const catId=el.dataset.cat,v=+el.dataset.v;
      if(!ST.betDraft[catId])ST.betDraft[catId]={sel:null,amt:0};
      const myChips=me?me.chips:0;
      const spent=Object.values(ST.betDraft).reduce((s,b)=>s+(b.amt||0),0);
      const thisCat=ST.betDraft[catId].amt||0;
      if(thisCat+v+(spent-thisCat)>myChips){toast('Недостаточно фишек');return}
      ST.betDraft[catId].amt+=v;
      refreshCatBlock(catId,me);
    });
  });
  checkConfirmBtn();
}

function refreshCatBlock(catId,me){
  const bs=ST.betDraft[catId]||{sel:null,amt:0};
  const sdEl=document.getElementById('sd-'+catId);
  if(sdEl)sdEl.textContent='🪙'+bs.amt;
  const cbhEl=document.getElementById('cbh-'+catId);
  if(cbhEl)cbhEl.textContent=bs.sel?'🪙'+bs.amt:'—';
  const cbEl=document.getElementById('cb-'+catId);
  if(cbEl)cbEl.classList.toggle('done',!!bs.sel);
  checkConfirmBtn();
}

function checkConfirmBtn(){
  const btn=document.getElementById('p-confirm-btn');
  if(!btn)return;
  const anyBet=Object.values(ST.betDraft).some(b=>b.sel&&b.amt>0);
  btn.disabled=!anyBet;
}

function clearDraft(catId){
  ST.betDraft[catId]={sel:null,amt:0};
  sb.from('sessions').select('*').eq('code',ST.code).single().then(({data})=>{if(data){const me=(data.players||{})[ST.pid];renderBettingUI(data,me,data.current_round)}});
}

// ── CONFIRM SCREEN ──
function openConfirmScreen(){
  sb.from('sessions').select('*').eq('code',ST.code).single().then(({data:sess})=>{
    if(!sess)return;
    const me=(sess.players||{})[ST.pid];
    const cats=sess.cats||[];
    const bets=Object.entries(ST.betDraft).filter(([,b])=>b.sel&&b.amt>0);
    const totalAmt=bets.reduce((s,[,b])=>s+b.amt,0);
    let cardsHtml=bets.map(([catId,b])=>{
      const cat=cats.find(c=>c.id===catId);
      return`<div style="background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px">
        <div style="flex:1">
          <div class="lbl" style="margin-bottom:4px">${esc(cat?.name||catId)}</div>
          <div style="font-size:17px;font-weight:500">${esc(b.sel)}</div>
          <div style="font-size:12px;color:rgba(245,240,232,.4);margin-top:2px">×${cat?.mult||2} при угадывании</div>
        </div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold)">🪙${b.amt}</div>
      </div>`;
    }).join('');
    const r=sess.current_round,wine=sess.wines[r-1];
    const html=`
      <div class="page-header">
        <button class="back" onclick="closeConfirmScreen()">← Изменить</button>
        <div class="page-title">${esc(wine?.name||'Вино №'+r)}</div>
      </div>
      <div class="scroll" id="confirm-screen-el">
        <div class="lbl" style="margin-bottom:16px">Ваши ставки</div>
        ${cardsHtml}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid rgba(201,168,76,.12);margin-top:4px">
          <span style="font-size:14px;color:rgba(245,240,232,.5)">Всего ставка</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold)">🪙${totalAmt}</span>
        </div>
        <div style="height:80px"></div>
      </div>
      <div class="confirm-footer">
        <button class="btn-ghost" style="flex:1" onclick="closeConfirmScreen()">← Изменить</button>
        <button class="btn-gold" style="flex:2" onclick="confirmBets()">Подтвердить ✓</button>
      </div>`;
    const ov=showOverlay(html,'confirm-overlay');
    ov.id='confirm-screen-id';
  });
}

function closeConfirmScreen(){
  removeOverlay();
  sb.from('sessions').select('*').eq('code',ST.code).single().then(({data})=>{if(data){const me=(data.players||{})[ST.pid];renderBettingUI(data,me,data.current_round)}});
}

async function confirmBets(){
  const{data:sess}=await sb.from('sessions').select('*').eq('code',ST.code).single();
  const me=(sess.players||{})[ST.pid];if(!me)return;
  const r=sess.current_round;
  const bets=sess.bets||{};
  if(!bets[r])bets[r]={};
  bets[r][ST.pid]={};
  let totalSpent=0;
  Object.entries(ST.betDraft).forEach(([catId,b])=>{
    if(b.sel&&b.amt>0){bets[r][ST.pid][catId]={sel:b.sel,amt:b.amt};totalSpent+=b.amt}
  });
  const players=sess.players;
  players[ST.pid].chips-=totalSpent;
  await sb.from('sessions').update({bets,players}).eq('code',ST.code);
  removeOverlay();
  // Show felt screen
  const updSess=await sb.from('sessions').select('*').eq('code',ST.code).single();
  showFeltScreen(updSess.data,bets[r][ST.pid],r,(updSess.data?.players||{})[ST.pid]);
}

// ── FELT WAITING SCREEN ──
function showFeltScreen(sess,myBets,r,me){
  removeOverlay();
  const wine=sess.wines[r-1];
  const html=`
    <div class="felt-header">
      <div style="flex:1">
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">${esc(wine?.name||'Вино №'+r)}</div>
        <div class="lbl" style="margin-top:2px">Ставки приняты · Ожидаем ответа</div>
      </div>
      <div class="spinner"></div>
    </div>
    <div class="felt-content" id="felt-screen-el">
      <div class="lbl" style="margin-bottom:12px">Ваши ставки</div>
      <div id="felt-my-bets">
        ${Object.entries(myBets).map(([catId,b])=>{
          const cat=(sess.cats||[]).find(c=>c.id===catId);
          return`<div class="felt-bet-card">
            <div class="felt-cat-name">${esc(cat?.name||catId)}</div>
            <div class="felt-cat-sel">${esc(b.sel)}</div>
            <div class="felt-cat-amt">🪙 ${b.amt}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="div"></div>
      <div id="felt-others"></div>
    </div>`;
  const el=showOverlay(html,'felt-screen');
  el.id='felt-screen-id';
  updateFeltOthers(sess,r);
}

function updateFeltOthers(sess,r){
  const el=document.getElementById('felt-others');if(!el)return;
  const roundBets=(sess.bets||{})[r]||{},players=sess.players||{};
  // Show ALL players — those who bet show bets, others show waiting
  const allPlayers=Object.entries(players).filter(([pid])=>pid!==ST.pid);
  if(!allPlayers.length){el.innerHTML='';return}
  let h=`<div class="others-felt"><div class="others-felt-title">Ставки других игроков</div>`;
  allPlayers.forEach(([pid,p])=>{
    const pb=roundBets[pid];
    if(pb){
      const tags=Object.entries(pb).map(([catId,bet])=>{
        const cat=(sess.cats||[]).find(c=>c.id===catId);
        return`<span class="other-chip-tag">${esc(cat?.name||catId)}: ${esc(bet.sel)} 🪙${bet.amt}</span>`;
      }).join('');
      h+=`<div class="other-row"><div class="other-name">${esc(p.name)}</div><div class="other-chips-list">${tags}</div></div>`;
    } else {
      h+=`<div class="other-row"><div class="other-name">${esc(p.name)}</div><div class="other-chips-list"><span style="font-size:11px;color:rgba(245,240,232,.25)">думает...</span></div></div>`;
    }
  });
  el.innerHTML=h+'</div>';
}

// ── RESULT SCREEN ──
function showResultScreen(sess,myBets,revealed,r,me){
  const existingFelt=document.getElementById('felt-screen-id');
  if(existingFelt)existingFelt.remove();
  if(playerOverlay&&playerOverlay.id==='felt-screen-id')playerOverlay=null;
  const wine=sess.wines[r-1];
  const cats=sess.cats||[];
  const allRevealed=cats.every(c=>revealed[c.id]);
  let totalEarned=0,totalLost=0;
  const catCards=cats.map((cat,i)=>{
    const ans=revealed[cat.id];
    if(!ans)return'';
    const myBet=myBets?.[cat.id];
    const won=myBet&&myBet.sel===ans;
    const nobet=!myBet;
    if(won)totalEarned+=myBet.amt*cat.mult;
    if(!won&&myBet)totalLost+=myBet.amt;
    const cls=nobet?'nobet':won?'win':'lose';
    const icon=nobet?'🤷':won?'🎉':'😔';
    const earnTxt=nobet?'':(won?`+🪙${myBet.amt*cat.mult}`:`-🪙${myBet.amt}`);
    return`<div class="result-cat-card ${cls}" style="animation-delay:${i*0.1}s">
      <div class="result-cat-icon">${icon}</div>
      <div class="result-cat-info">
        <div class="result-cat-label">${esc(cat.name)} ×${cat.mult}</div>
        <div class="result-cat-answer">${esc(ans)}</div>
        ${myBet?`<div class="result-cat-yours">Вы: ${esc(myBet.sel)}</div>`:'<div class="result-cat-yours" style="color:rgba(245,240,232,.25)">Ставки не было</div>'}
      </div>
      ${myBet?`<div class="result-cat-earn ${won?'win':'lose'}">${earnTxt}</div>`:''}
    </div>`;
  }).join('');

  const totalNet=totalEarned-totalLost;
  const html=`
    <div style="padding:20px 16px 8px;position:relative;z-index:1;width:100%">
      <div class="result-wine-title">${esc(wine?.name||'Вино №'+r)}</div>
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,.4);text-align:center;margin-bottom:20px">Результаты раунда</div>
    </div>
    <div class="result-cards-wrap" id="result-screen-el">
      ${catCards}
      ${allRevealed?`<div class="total-earned">
        <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.35);margin-bottom:8px">${totalNet>=0?'Итого заработано':'Итого потеряно'}</div>
        <div class="total-earned-num" style="color:${totalNet>=0?'#2ecc71':'#e74c3c'}">${totalNet>=0?'+':''} 🪙${totalNet}</div>
        <div style="font-size:14px;color:rgba(245,240,232,.4);margin-top:8px">Ваш баланс: 🪙${me?me.chips:'—'}</div>
      </div>
      <div style="padding:0 16px 16px"><button class="btn-gold" onclick="readyForNext()">Готов к следующему вину →</button></div>`
      :'<div style="text-align:center;padding:20px;color:rgba(245,240,232,.35);font-size:13px">Ожидаем остальных ответов...</div>'}
      ${allRevealed?lbHTMLsmall(sess):''}
    </div>`;
  const el=showOverlay(html,'result-screen');
  el.id='result-screen-id';
  // Animate chips if won
  if(totalEarned>0)animateChips(totalEarned);
}

function readyForNext(){
  const rs=document.getElementById('result-screen-id');
  if(rs){rs.remove();if(playerOverlay===rs)playerOverlay=null;}
  ST.readyForNext=true;ST.lastRound=0; // reset so renderPlayer re-evaluates
  sb.from('sessions').select('*').eq('code',ST.code).single().then(({data})=>{if(data)renderPlayer(data)});
}

function updateResultScreen(sess,myBets,revealed,r,me){
  // Just re-render the whole thing
  const el=document.getElementById('result-screen-id');
  if(el){el.remove();if(playerOverlay===el)playerOverlay=null}
  showResultScreen(sess,myBets,revealed,r,me);
}

function animateChips(amount){
  const count=Math.min(Math.ceil(amount/20),12);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='chip-fly';
      el.textContent='🪙';
      const tx=(Math.random()-0.5)*200;
      const ty=-(Math.random()*300+100);
      el.style.cssText=`left:${30+Math.random()*40}%;top:60%;--tx:${tx}px;--ty:${ty}px;animation-delay:${Math.random()*0.4}s`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1800);
    },i*80);
  }
}

function lbHTMLsmall(sess){
  const sorted=Object.entries(sess.players||{}).sort((a,b)=>b[1].chips-a[1].chips);
  return`<div style="padding:0 0 16px"><div class="lbl" style="margin:16px 0 10px">Рейтинг</div>
  <div class="lb">${sorted.map(([id,p],i)=>`<div class="lb-row ${id===ST.pid?'me':''}">
    <div class="lb-rank ${i<3?'top':''}">${i+1}</div>
    <div class="avatar" style="background:${avc(p.name)};width:28px;height:28px;font-size:12px">${p.name[0].toUpperCase()}</div>
    <div style="flex:1;font-size:14px">${esc(p.name)}${id===ST.pid?' <span style="font-size:11px;opacity:.5">(вы)</span>':''}</div>
    <div class="lb-chips">🪙 ${p.chips}</div>
  </div>`).join('')}</div></div>`;
}

// ── FINAL SCREEN ──
function showFinalScreen(sess){
  const sorted=Object.entries(sess.players||{}).sort((a,b)=>b[1].chips-a[1].chips);
  const winner=sorted[0];
  const html=`
    <div style="position:fixed;inset:0;z-index:70;background:var(--felt);overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .3s ease">
      <div style="padding:40px 20px 20px;text-align:center;position:relative;z-index:1">
        <div class="winner-crown">🏆</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--gold);margin-bottom:4px">Игра завершена!</div>
        <div style="font-size:14px;color:rgba(245,240,232,.4);margin-bottom:8px">${esc(sess.name)}</div>
        ${winner?`<div style="font-size:15px;color:rgba(245,240,232,.6)">Победитель: <strong style="color:var(--gl)">${esc(winner[1].name)}</strong> · 🪙${winner[1].chips}</div>`:''}
      </div>
      <div style="padding:0 16px 40px;position:relative;z-index:1">
        <div class="lbl" style="margin-bottom:12px">Итоговая таблица</div>
        <div class="lb">
          ${sorted.map(([id,p],i)=>`<div class="lb-row ${i===0?'winner':''} ${id===ST.pid?'me':''}">
            <div class="lb-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
            <div class="avatar" style="background:${avc(p.name)};width:32px;height:32px;font-size:14px">${p.name[0].toUpperCase()}</div>
            <div style="flex:1">
              <div style="font-size:15px">${esc(p.name)}${id===ST.pid?' <span style="font-size:11px;opacity:.5">(вы)</span>':''}</div>
              ${i===0?`<div style="font-size:11px;color:var(--gold);margin-top:2px">Победитель!</div>`:''}
            </div>
            <div class="lb-chips">🪙 ${p.chips}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  const el=document.createElement('div');
  el.innerHTML=html;
  document.body.appendChild(el.firstElementChild);
}

// ── UTILS ──
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[~~(Math.random()*c.length)];return r}
function genId(){return Math.random().toString(36).slice(2,11)}
const AVC=['#7a1b2e','#2471a3','#1e8449','#634a1e','#5b3a8a','#1a6f6f','#9c4a00','#1a5a5a'];
function avc(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%AVC.length;return AVC[h]}
function pl(n,one,few,many){if(n%10===1&&n%100!==11)return one;if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return few;return many}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}

window.addEventListener('DOMContentLoaded',()=>{renderWinesList();go('screen-landing')});
</script>
